<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UBee 城市任務平台</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #111111;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .home {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffd54a;
      color: #111111;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 26px;
      letter-spacing: 0.5px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 30px;
      }

      .brand {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="home">
    <div class="brand">UBee 城市任務平台</div>

    <h1>
      把麻煩交給 UBee，<br>
      讓城市任務更快完成。
    </h1>
  </main>
</body>
</html>
