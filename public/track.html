<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UBee｜配送追蹤</title>

<style>
:root{
  --bg:#000;
  --card:#111;
  --line:rgba(255,255,255,.12);
  --text:#fff;
  --muted:#a8a8a8;
  --yellow:#facc15;
  --green:#22c55e;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  margin-bottom:16px;
}

.title{
  font-size:28px;
  font-weight:900;
}

.order-no{
  color:var(--muted);
  margin-top:6px;
}

.status{
  margin-top:20px;
}

.step{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.dot{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#333;
}

.dot.done{
  background:var(--green);
}

.step-text{
  font-size:16px;
  font-weight:700;
}

.close-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:var(--yellow);
  color:#000;
  font-size:18px;
  font-weight:900;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
  <div class="title">UBee 配送追蹤</div>

  <div class="order-no">
    訂單編號：<span id="orderIdText">讀取中...</span>
  </div>
</div>

<div class="card">

  <div class="step">
    <div class="dot done"></div>
    <div class="step-text">訂單已建立</div>
  </div>

  <div class="step">
    <div class="dot done"></div>
    <div class="step-text">騎士已接單</div>
  </div>

  <div class="step">
    <div class="dot done"></div>
    <div class="step-text">騎士已到店</div>
  </div>

  <div class="step">
    <div class="dot"></div>
    <div class="step-text">騎士已取貨</div>
  </div>

  <div class="step">
    <div class="dot"></div>
    <div class="step-text">配送中</div>
  </div>

  <div class="step">
    <div class="dot"></div>
    <div class="step-text">已送達</div>
  </div>

  <div class="step">
    <div class="dot"></div>
    <div class="step-text">訂單完成</div>
  </div>

</div>

<button class="close-btn">
返回首頁
</button>

</div>

<script>
function getQueryParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name) || "";
}

function initTrackPage(){
  const orderId = getQueryParam("orderId") || getQueryParam("id");

  const orderIdText = document.getElementById("orderIdText");

  if(orderIdText){
    orderIdText.textContent = orderId || "尚未指定訂單";
  }
}

initTrackPage();
</script>
</body>
</html>
