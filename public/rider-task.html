<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UBee｜騎士接單</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  overflow:hidden;
}
#map{position:fixed;inset:0;width:100%;height:100vh;background:#111;z-index:1}

.top-bar{
  position:fixed;top:14px;left:14px;right:14px;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
}
.pill{
  background:rgba(0,0,0,.82);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:11px 16px;
  font-size:15px;
  font-weight:900;
}

.locate-btn{
  position:fixed;right:18px;bottom:115px;z-index:12;
  width:52px;height:52px;border-radius:999px;border:0;
  background:#111;color:#fff;font-size:22px;
  border:1px solid rgba(255,255,255,.18);
}

.bottom-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  padding:14px 16px calc(18px + env(safe-area-inset-bottom));
  background:rgba(10,10,10,.94);
  border-radius:26px 26px 0 0;
  border-top:1px solid rgba(255,255,255,.12);
}
.handle{
  width:46px;height:5px;border-radius:999px;
  background:rgba(255,255,255,.24);
  margin:0 auto 14px;
}
.online-btn{
  width:100%;height:64px;border:0;border-radius:999px;
  background:#2563eb;color:#fff;font-size:25px;font-weight:950;
}
.online-btn.off{background:#2b2b2b}

.offer-card{
  position:fixed;
  left:16px;
  right:16px;
  bottom:calc(30px + env(safe-area-inset-bottom));
  z-index:30;
  background:#f7f7f7;
  color:#000;
  border:3px solid #000;
  border-radius:22px;
  padding:18px;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}
.offer-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.tag{
  display:inline-block;
  background:#138a44;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  font-size:15px;
  font-weight:900;
}
.close-btn{
  width:58px;height:58px;border:0;border-radius:14px;
  background:#eee;color:#111;font-size:34px;font-weight:700;
}
.fare{
  margin-top:14px;
  font-size:54px;
  line-height:1;
  font-weight:950;
  letter-spacing:-2px;
}
.meta{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid #ddd;
  font-size:21px;
  font-weight:900;
}
.route-box{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid #ddd;
  display:grid;
  grid-template-columns:22px 1fr;
  gap:10px;
}
.route-line{
  position:relative;
  width:14px;
  margin-top:6px;
}
.route-line:before{
  content:"";
  position:absolute;
  top:8px;bottom:8px;left:6px;
  width:2px;background:#111;
}
.point{
  width:10px;height:10px;background:#111;border-radius:999px;
  position:relative;z-index:2;margin-bottom:72px;
}
.point.end{border-radius:0;margin-bottom:0}
.addr{
  font-size:21px;
  line-height:1.35;
  font-weight:900;
}
.addr + .addr{margin-top:18px}
.accept-btn{
  width:100%;
  height:62px;
  border:0;
  border-radius:12px;
  background:#000;
  color:#fff;
  font-size:24px;
  font-weight:950;
  margin-top:18px;
}
.hidden{display:none}
</style>
</head>

<body>
<div id="map"></div>

<div class="top-bar">
  <div class="pill">UBee 騎士</div>
  <div id="topStatus" class="pill">離線</div>
</div>

<button id="locateBtn" class="locate-btn">◎</button>

<div id="bottomPanel" class="bottom-panel">
  <div class="handle"></div>
  <button id="onlineBtn" class="online-btn off">上線</button>
</div>

<div id="offerCard" class="offer-card hidden">
  <div class="offer-top">
    <div>
      <div class="tag" id="serviceText">任務</div>
      <div class="fare" id="fareText">$0</div>
    </div>
    <button id="closeOfferBtn" class="close-btn">×</button>
  </div>

  <div class="meta" id="metaText">時間 / 距離待估</div>

  <div class="route-box">
    <div class="route-line">
      <div class="point"></div>
      <div class="point end"></div>
    </div>
    <div>
      <div class="addr" id="pickupText">取件地點</div>
      <div class="addr" id="dropoffText">送達地點</div>
    </div>
  </div>

  <button id="acceptBtn" class="accept-btn">接受任務</button>
</div>

<script>
const LIFF_ID = "2009895876-hiq8YW0n";

let lineUserId = "";
let riderProfile = null;
let isOnline = false;

let map = null;
let riderMarker = null;
let currentPosition = null;
let refreshTimer = null;

let taskMarkers = [];
let latestTasks = [];
let lastTaskIds = [];
let activeTask = null;
let dismissedTaskIds = new Set();

let directionsService = null;
let directionsRenderer = null;

const onlineBtn = document.getElementById("onlineBtn");
const topStatus = document.getElementById("topStatus");
const locateBtn = document.getElementById("locateBtn");
const bottomPanel = document.getElementById("bottomPanel");
const offerCard = document.getElementById("offerCard");

function setStatus(text, isError = false){
  console.log(isError ? "ERROR:" : "STATUS:", text);
}

function safeText(value){
  return value || "未填寫";
}

function money(value){
  if(value === undefined || value === null || value === "") return "$0";
  return "$" + Number(value).toLocaleString("zh-TW");
}

function setOnlineUI(online){
  isOnline = online;
  onlineBtn.textContent = online ? "下線" : "上線";
  onlineBtn.className = online ? "online-btn" : "online-btn off";
  topStatus.textContent = online ? "上線中" : "離線";
}

async function init(){
  try{
    setStatus("正在啟動 LIFF...");
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    setStatus("正在確認騎士身分...");
    await loadRiderProfile();

    setStatus("正在啟動地圖定位...");
    await initMap();

    await loadTasks();

    refreshTimer = setInterval(() => {
      if(lineUserId && riderProfile && isOnline){
        loadTasks();
      }
    }, 10000);

  }catch(err){
    console.error(err);
    alert("初始化失敗：" + (err.message || JSON.stringify(err)));
  }
}

async function loadRiderProfile(){
  const res = await fetch(`/api/rider/profile?lineUserId=${encodeURIComponent(lineUserId)}`);
  if(!res.ok) throw new Error("找不到騎士資料");

  const data = await res.json();
  if(!data || !data.rider) throw new Error("尚未通過騎士審核");

  riderProfile = data.rider;
  if(riderProfile.status !== "approved") throw new Error("騎士未通過審核");

  setOnlineUI(riderProfile.online === true);
}

async function initMap(){
  const configRes = await fetch("/api/config");
  const config = await configRes.json();

  if(!config.googleMapsApiKey){
    throw new Error("缺少 Google Maps API Key");
  }

  await loadGoogleMaps(config.googleMapsApiKey);

  const position = await getCurrentPosition();
  currentPosition = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  map = new google.maps.Map(document.getElementById("map"), {
    center: currentPosition,
    zoom: 15,
    disableDefaultUI: true,
    gestureHandling: "greedy",
    styles: [
      { elementType: "geometry", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#2b2b2b" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0b1720" }] },
      { featureType: "poi", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "off" }] }
    ]
  });

  riderMarker = new google.maps.Marker({
    position: currentPosition,
    map,
    title: "目前位置",
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 9,
      fillColor: "#2563eb",
      fillOpacity: 1,
      strokeColor: "#ffffff",
      strokeWeight: 3
    }
  });

  directionsService = new google.maps.DirectionsService();

  directionsRenderer = new google.maps.DirectionsRenderer({
    map,
    suppressMarkers:false,
    polylineOptions:{
      strokeColor:"#111111",
      strokeWeight:6,
      strokeOpacity:.9
    }
  });
}

function loadGoogleMaps(key){
  return new Promise((resolve, reject) => {
    if(window.google && window.google.maps){
      resolve();
      return;
    }

    window.gm_authFailure = function(){
      reject(new Error("Google Maps 金鑰授權失敗"));
    };

    window.initGoogleMapScript = function(){
      resolve();
    };

    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=initGoogleMapScript&v=weekly`;
    script.async = true;
    script.defer = true;
    script.onerror = () => reject(new Error("Google Maps 載入失敗"));
    document.head.appendChild(script);
  });
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation){
      reject(new Error("此裝置不支援定位"));
      return;
    }

    navigator.geolocation.getCurrentPosition(resolve, () => {
      reject(new Error("定位失敗，請允許位置權限"));
    }, {
      enableHighAccuracy:true,
      timeout:12000,
      maximumAge:0
    });
  });
}

async function recenterMap(){
  try{
    const position = await getCurrentPosition();
    currentPosition = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    if(map){
      map.panTo(currentPosition);
      map.setZoom(15);
    }

    if(riderMarker){
      riderMarker.setPosition(currentPosition);
    }
  }catch(err){
    alert(err.message || "重新定位失敗");
  }
}

async function toggleOnline(){
  try{
    const nextOnline = !isOnline;

    onlineBtn.disabled = true;
    onlineBtn.textContent = nextOnline ? "上線中..." : "下線中...";

    const res = await fetch("/api/rider/status", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ lineUserId, online:nextOnline })
    });

    const data = await res.json();

    if(!res.ok || !data.success){
      throw new Error(data.message || data.error || "狀態更新失敗");
    }

    setOnlineUI(nextOnline);

    if(nextOnline){
      await loadTasks();
    }else{
      hideOffer();
      clearTaskMarkers();
    }

  }catch(err){
    alert(err.message || "狀態更新失敗");
    setOnlineUI(isOnline);
  }finally{
    onlineBtn.disabled = false;
  }
}

async function loadTasks(){
  const res = await fetch("/api/rider/tasks");
  if(!res.ok) throw new Error("任務載入失敗");

  const data = await res.json();
  const newTasks = data.tasks || [];
  const newTaskIds = newTasks.map(task => task.id);

  const hasNewTask = newTaskIds.some(id => !lastTaskIds.includes(id));

  if(hasNewTask && lastTaskIds.length > 0){
    notifyNewTask();
  }

  lastTaskIds = newTaskIds;
  latestTasks = newTasks;

  clearTaskMarkers();

  if(!isOnline){
    hideOffer();
    return;
  }

  if(latestTasks.length === 0){
    hideOffer();
    return;
  }

  const visibleTasks = latestTasks.filter(t => !dismissedTaskIds.has(t.id));

  if(visibleTasks.length === 0){
    hideOffer();
    return;
  }

  activeTask = visibleTasks[0];

  await renderTaskMarkers(visibleTasks);
  await showOffer(activeTask);
}

function notifyNewTask(){
  try{
    if(navigator.vibrate){
      navigator.vibrate([300,150,300]);
    }

    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
    audio.volume = 1;
    audio.play();
  }catch(err){
    console.error("通知播放失敗", err);
  }
}

function clearTaskMarkers(){
  taskMarkers.forEach(marker => marker.setMap(null));
  taskMarkers = [];
}

async function getLatLngFromAddress(address){
  return new Promise((resolve) => {
    if(!address || !window.google || !google.maps){
      resolve(null);
      return;
    }

    const geocoder = new google.maps.Geocoder();

    geocoder.geocode({ address:`台灣 ${address}` }, (results, status) => {
      if(status === "OK" && results && results[0]){
        const loc = results[0].geometry.location;
        resolve({ lat:loc.lat(), lng:loc.lng() });
      }else{
        resolve(null);
      }
    });
  });
}

async function renderTaskMarkers(tasks){
  if(!map || !tasks.length) return;

  for(const order of tasks){
    const pos = await getLatLngFromAddress(order.pickupAddress);
    if(!pos) continue;

    const marker = new google.maps.Marker({
      position:pos,
      map,
      title:order.serviceType || "UBee 任務"
    });

    marker.addListener("click", async () => {
      activeTask = order;
      await showOffer(order);
    });

    taskMarkers.push(marker);
  }
}

async function getRiderDistanceInfo(order){
  try{
    if(!currentPosition || !order.pickupAddress){
      return null;
    }

    const res = await fetch("/api/rider-distance-to-pickup", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        riderLat:currentPosition.lat,
        riderLng:currentPosition.lng,
        pickupAddress:order.pickupAddress
      })
    });

    const data = await res.json();
    if(!res.ok || !data.success) return null;
    return data;
  }catch(err){
    return null;
  }
}

async function showOffer(order){
  const distanceInfo = await getRiderDistanceInfo(order);

  document.getElementById("serviceText").textContent =
    safeText(order.serviceType || order.serviceName || "任務");

  document.getElementById("fareText").textContent =
    money(order.driverFee || order.total || order.totalFee || order.estimatedFee);

  let metaText = distanceInfo
  ? `騎士到取件：約 ${distanceInfo.durationText}｜${distanceInfo.distanceText}`
  : "騎士到取件：時間 / 距離待估";

if(distanceInfo){
  const isFar =
    distanceInfo.distanceMeters > 20000 ||
    distanceInfo.durationSeconds > 40 * 60;

  if(isFar){
    metaText += "｜⚠️ 距離較遠";
  }
}

document.getElementById("metaText").textContent = metaText;

  document.getElementById("pickupText").textContent = safeText(order.pickupAddress);
  document.getElementById("dropoffText").textContent = safeText(order.dropoffAddress);

  document.getElementById("acceptBtn").disabled = false;
  document.getElementById("acceptBtn").textContent = "接受任務";
  document.getElementById("acceptBtn").onclick = () => acceptTask(order.id);

  offerCard.classList.remove("hidden");
  bottomPanel.classList.add("hidden");

  drawPreviewRoute(order);
}

async function drawPreviewRoute(order){
  if(!directionsService || !directionsRenderer || !currentPosition) return;

  directionsService.route({
    origin:currentPosition,
    destination:order.pickupAddress,
    travelMode:google.maps.TravelMode.DRIVING,
    region:"TW"
  }, (result, status) => {
    if(status === "OK"){
      directionsRenderer.setDirections(result);
    }
  });
}

function hideOffer(){
  offerCard.classList.add("hidden");
  bottomPanel.classList.remove("hidden");
  activeTask = null;

  if(directionsRenderer){
    directionsRenderer.setDirections({ routes: [] });
  }
}

async function acceptTask(orderDocId){
  const btn = document.getElementById("acceptBtn");

  try{
    if(!orderDocId){
      throw new Error("缺少任務編號");
    }

    if(!lineUserId){
      throw new Error("尚未取得 LINE 使用者資料");
    }

    if(!riderProfile){
      throw new Error("尚未取得騎士資料");
    }

    btn.disabled = true;
    btn.textContent = "接單中...";

    const res = await fetch("/api/rider/accept-order", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        orderId:orderDocId,
        lineUserId,
        riderId:riderProfile.riderId || riderProfile.id || "",
        riderName:riderProfile.name || "",
        riderPhone:riderProfile.phone || ""
      })
    });

    let data = {};
    try{
      data = await res.json();
    }catch(e){
      data = {};
    }

    if(!res.ok || data.success !== true){
      throw new Error(data.error || data.message || "接單失敗");
    }

    location.href =
      `/rider-order.html?orderId=${encodeURIComponent(orderDocId)}&autoNav=pickup`;

  }catch(err){
    console.error("acceptTask error:", err);
    alert(err.message || "接單失敗，請稍後再試。");

    btn.disabled = false;
    btn.textContent = "接受任務";
  }
}

document.getElementById("closeOfferBtn").addEventListener("click", () => {
  if(activeTask?.id){
    dismissedTaskIds.add(activeTask.id);
  }
  hideOffer();
});

onlineBtn.addEventListener("click", toggleOnline);
locateBtn.addEventListener("click", recenterMap);

init();
</script>

</body>
</html>
