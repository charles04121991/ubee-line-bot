<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UBee｜騎士接單</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root{
  --bg:#000;
  --card:#111;
  --card2:#181818;
  --line:rgba(255,255,255,.12);
  --text:#f5f5f5;
  --muted:#a8a8a8;
  --white:#fff;
  --blue:#2563eb;
  --green:#22c55e;
  --yellow:#facc15;
}
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;background:#000;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  overflow:hidden;
}
#map{position:fixed;inset:0;width:100%;height:100vh;background:#111;z-index:1}
.top-bar{
  position:fixed;top:14px;left:14px;right:14px;z-index:10;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.brand-pill,.status-pill{
  background:rgba(0,0,0,.78);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);border-radius:999px;
  padding:10px 14px;font-size:14px;font-weight:800;
}
.status-pill{color:#d1d5db;font-weight:700}
.location-btn{
  position:fixed;right:16px;bottom:320px;z-index:10;
  width:48px;height:48px;border-radius:999px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.8);color:#fff;font-size:20px;
}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  max-height:58vh;background:rgba(12,12,12,.97);backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.12);border-radius:26px 26px 0 0;
  padding:14px 16px calc(20px + env(safe-area-inset-bottom));overflow:auto;
}
.handle{width:46px;height:5px;border-radius:999px;background:rgba(255,255,255,.25);margin:0 auto 14px}
.online-btn{
  width:100%;height:64px;border:0;border-radius:999px;background:var(--blue);
  color:#fff;font-size:24px;font-weight:900;margin-bottom:14px;
}
.online-btn.off{background:#2b2b2b;color:#fff}
.status{
  margin:0 0 12px;padding:12px 14px;border-radius:14px;background:var(--card2);
  border:1px solid var(--line);color:var(--muted);font-size:14px;
}
.status.error{color:#ffb4b4;border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.12)}
.task{
  background:#101010;
  border:1px solid rgba(255,255,255,.14);
  border-radius:24px;
  padding:18px;
  margin-bottom:14px;
}
.task-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:16px;
}
.fare{
  font-size:40px;
  line-height:1;
  font-weight:950;
  letter-spacing:-1px;
}
.arrival{
  text-align:right;
  color:#fff;
}
.arrival-main{
  font-size:20px;
  font-weight:900;
}
.arrival-sub{
  margin-top:4px;
  font-size:13px;
  color:var(--muted);
}
.order-id{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.service{
  font-size:17px;
  font-weight:900;
}
.badge{
  display:inline-block;
  margin-top:8px;
  white-space:nowrap;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  color:#000;
  background:var(--yellow);
  font-weight:900;
}
.route{
  margin-top:14px;
  border-top:1px solid var(--line);
  padding-top:14px;
}
.route-row{
  display:grid;
  grid-template-columns:24px 1fr;
  gap:10px;
  margin-bottom:14px;
}
.dot{
  width:12px;
  height:12px;
  border-radius:999px;
  margin-top:5px;
  background:#22c55e;
}
.dot.drop{background:#fff}
.route-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:4px;
}
.route-value{
  font-size:15px;
  line-height:1.45;
  word-break:break-word;
}
.item-box{
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:#ddd;
  font-size:14px;
  line-height:1.5;
}
.accept-btn{
  width:100%;
  border:0;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  font-weight:950;
  margin-top:16px;
  color:#fff;
  background:var(--green);
}
.accept-btn:disabled{opacity:.45;background:#555}
.empty{text-align:center;color:var(--muted);padding:26px 10px;line-height:1.7}
</style>
</head>

<body>
<div id="map"></div>

<div class="top-bar">
  <div class="brand-pill">UBee 騎士</div>
  <div id="topStatus" class="status-pill">離線</div>
</div>

<button id="locateBtn" class="location-btn">◎</button>

<div class="sheet">
  <div class="handle"></div>
  <button id="onlineBtn" class="online-btn off">上線</button>
  <div id="status" class="status">正在初始化騎士系統...</div>
  <div id="taskList"></div>
</div>

<script>
const LIFF_ID = "2009895876-hiq8YW0n";

let lineUserId = "";
let riderProfile = null;
let isOnline = false;

let map = null;
let riderMarker = null;
let currentPosition = null;
let refreshTimer = null;

let taskMarkers = [];
let latestTasks = [];
let lastTaskIds = [];

const statusBox = document.getElementById("status");
const taskList = document.getElementById("taskList");
const onlineBtn = document.getElementById("onlineBtn");
const topStatus = document.getElementById("topStatus");
const locateBtn = document.getElementById("locateBtn");

function setStatus(text, isError = false){
  statusBox.textContent = text;
  statusBox.className = isError ? "status error" : "status";
}

function safeText(value){
  return value || "未填寫";
}

function money(value){
  if(value === undefined || value === null || value === "") return "待確認";
  return "$" + Number(value).toLocaleString("zh-TW");
}

function setOnlineUI(online){
  isOnline = online;
  onlineBtn.textContent = online ? "下線" : "上線";
  onlineBtn.className = online ? "online-btn" : "online-btn off";
  topStatus.textContent = online ? "上線中" : "離線";
}

async function init(){
  try{
    setStatus("正在啟動 LIFF...");
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    setStatus("正在確認騎士身分...");
    await loadRiderProfile();

    setStatus("正在啟動地圖定位...");
    await initMap();

    setStatus("正在載入可接任務...");
    await loadTasks();

    refreshTimer = setInterval(() => {
      if(lineUserId && riderProfile && isOnline){
        loadTasks();
      }
    }, 10000);

  }catch(err){
    console.error("INIT ERROR =", err);
    setStatus("初始化失敗：" + (err.message || JSON.stringify(err)), true);
  }
}

async function loadRiderProfile(){
  const res = await fetch(`/api/rider/profile?lineUserId=${encodeURIComponent(lineUserId)}`);
  if(!res.ok) throw new Error("找不到騎士資料");

  const data = await res.json();
  if(!data || !data.rider) throw new Error("尚未通過騎士審核");

  riderProfile = data.rider;
  if(riderProfile.status !== "approved") throw new Error("騎士未通過審核");

  setOnlineUI(riderProfile.online === true);
}

async function initMap(){
  const configRes = await fetch("/api/config");
  const config = await configRes.json();

  if(!config.googleMapsApiKey){
    throw new Error("缺少 Google Maps API Key");
  }

  await loadGoogleMaps(config.googleMapsApiKey);
  const position = await getCurrentPosition();

  currentPosition = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  map = new google.maps.Map(document.getElementById("map"), {
    center: currentPosition,
    zoom: 16,
    disableDefaultUI: true,
    gestureHandling: "greedy",
    styles: [
      { elementType: "geometry", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#8f8f8f" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#2b2b2b" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0b1720" }] },
      { featureType: "poi", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "off" }] }
    ]
  });

  riderMarker = new google.maps.Marker({
    position: currentPosition,
    map,
    title: "目前位置",
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 9,
      fillColor: "#2563eb",
      fillOpacity: 1,
      strokeColor: "#ffffff",
      strokeWeight: 3
    }
  });
}

function loadGoogleMaps(key){
  return new Promise((resolve, reject) => {
    if(window.google && window.google.maps){
      resolve();
      return;
    }

    window.gm_authFailure = function(){
      reject(new Error("Google Maps 金鑰授權失敗，請檢查 Billing、API 限制、網域限制"));
    };

    window.initGoogleMapScript = function(){
      resolve();
    };

    const script = document.createElement("script");
    script.src =
      `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=initGoogleMapScript&v=weekly`;
    script.async = true;
    script.defer = true;
    script.onerror = () => reject(new Error("Google Maps 載入失敗"));
    document.head.appendChild(script);
  });
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation){
      reject(new Error("此裝置不支援定位"));
      return;
    }

    navigator.geolocation.getCurrentPosition(resolve, () => {
      reject(new Error("定位失敗，請允許位置權限"));
    }, {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    });
  });
}

async function recenterMap(){
  try{
    const position = await getCurrentPosition();

    currentPosition = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    if(map){
      map.panTo(currentPosition);
      map.setZoom(16);
    }

    if(riderMarker){
      riderMarker.setPosition(currentPosition);
    }

  }catch(err){
    alert(err.message || "定位失敗");
  }
}

async function toggleOnline(){
  try{
    if(!lineUserId){
      alert("尚未取得 LINE 身分");
      return;
    }

    const nextOnline = !isOnline;

    onlineBtn.disabled = true;
    onlineBtn.textContent = nextOnline ? "上線中..." : "下線中...";

    const res = await fetch("/api/rider/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lineUserId, online: nextOnline })
    });

    const data = await res.json();

    if(!res.ok || !data.success){
      throw new Error(data.message || data.error || "狀態更新失敗");
    }

    setOnlineUI(nextOnline);

    if(nextOnline){
      setStatus("你已上線，正在接收可接任務。");
      await loadTasks();
    }else{
      clearTaskMarkers();
      setStatus("你已下線，暫停接收任務。");
      taskList.innerHTML = `
        <div class="empty">
          目前為離線狀態。<br>
          按下「上線」後開始接收任務。
        </div>
      `;
    }

  }catch(err){
    console.error(err);
    alert(err.message || "狀態更新失敗");
    setOnlineUI(isOnline);
  }finally{
    onlineBtn.disabled = false;
  }
}

async function loadTasks(){
  const res = await fetch("/api/rider/tasks");
  if(!res.ok) throw new Error("任務載入失敗");

  const data = await res.json();
  const newTasks = data.tasks || [];

const newTaskIds = newTasks.map(task => task.id);

const hasNewTask =
  newTaskIds.some(id => !lastTaskIds.includes(id));

if(hasNewTask && lastTaskIds.length > 0){

  try{

    if(navigator.vibrate){
      navigator.vibrate([300,150,300]);
    }

    const audio = new Audio(
      "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
    );

    audio.volume = 1;

    audio.play();

  }catch(err){
    console.error("通知播放失敗", err);
  }

  setStatus("收到新的任務通知");

}

lastTaskIds = newTaskIds;

latestTasks = newTasks;

renderTaskMarkers(latestTasks);

await renderTasks(latestTasks);
}

function clearTaskMarkers(){
  taskMarkers.forEach(marker => marker.setMap(null));
  taskMarkers = [];
}

async function getLatLngFromAddress(address){
  return new Promise((resolve) => {
    if(!address || !window.google || !google.maps){
      resolve(null);
      return;
    }

    const geocoder = new google.maps.Geocoder();

    geocoder.geocode({ address: `台灣 ${address}` }, (results, status) => {
      if(status === "OK" && results && results[0]){
        const loc = results[0].geometry.location;
        resolve({ lat: loc.lat(), lng: loc.lng() });
      }else{
        resolve(null);
      }
    });
  });
}

function getTaskPosition(order){
  if(order.pickupLat && order.pickupLng){
    return {
      lat: Number(order.pickupLat),
      lng: Number(order.pickupLng)
    };
  }
  return null;
}

async function getTaskPositionSafe(order){
  const saved = getTaskPosition(order);
  if(saved) return saved;
  return await getLatLngFromAddress(order.pickupAddress);
}

async function renderTaskMarkers(tasks){
  clearTaskMarkers();

  if(!map || !isOnline || !tasks.length) return;

  for(const order of tasks){
    const pos = await getTaskPositionSafe(order);
    if(!pos) continue;

    const marker = new google.maps.Marker({
      position: pos,
      map,
      title: order.serviceType || "UBee 任務",
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: "#22c55e",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 3
      }
    });

    marker.addListener("click", async () => {
      map.panTo(pos);
      await renderTasks([order]);
      setStatus("已選取一張附近任務。");
    });

    taskMarkers.push(marker);
  }
}

async function getRiderDistanceInfo(order){
  try{
    if(!currentPosition || !order.pickupAddress){
      return null;
    }

    const res = await fetch("/api/rider-distance-to-pickup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        riderLat: currentPosition.lat,
        riderLng: currentPosition.lng,
        pickupAddress: order.pickupAddress
      })
    });

    const data = await res.json();

    if(!res.ok || !data.success){
      return null;
    }

    return data;

  }catch(err){
    console.error("距離計算失敗", err);
    return null;
  }
}

async function renderTasks(tasks){
  taskList.innerHTML = "";

  if(!isOnline){
    setStatus("目前為離線狀態。");
    taskList.innerHTML = `
      <div class="empty">
        按下「上線」後開始接收任務。
      </div>
    `;
    return;
  }

  if(tasks.length === 0){
    setStatus("目前沒有可接任務。");
    taskList.innerHTML = `
      <div class="empty">
        目前沒有新的任務。<br>
        系統會自動刷新。
      </div>
    `;
    return;
  }

  setStatus(`目前共有 ${tasks.length} 張可接任務。`);

  const renderedIds = new Set();

  for(const order of tasks){
    if(renderedIds.has(order.id)) continue;
    renderedIds.add(order.id);

    const distanceInfo = await getRiderDistanceInfo(order);

    const arrivalMain = distanceInfo?.durationText || "時間待估";
    const arrivalSub = distanceInfo?.distanceText
      ? `距離取件地 ${distanceInfo.distanceText}`
      : "距離待估";

    const card = document.createElement("div");
    card.className = "task";

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="fare">${money(order.driverFee || order.total || order.totalFee || order.estimatedFee)}</div>
          <div class="badge">${safeText(order.speedLabel || order.speedName || order.speedType)}</div>
        </div>

        <div class="arrival">
          <div class="arrival-main">${arrivalMain}</div>
          <div class="arrival-sub">${arrivalSub}</div>
        </div>
      </div>

      <div class="order-id">${safeText(order.id || order.orderId)}</div>
      <div class="service">${safeText(order.serviceType || order.serviceName)}</div>

      <div class="route">
        <div class="route-row">
          <div class="dot"></div>
          <div>
            <div class="route-label">取件地點</div>
            <div class="route-value">${safeText(order.pickupAddress)}</div>
          </div>
        </div>

        <div class="route-row">
          <div class="dot drop"></div>
          <div>
            <div class="route-label">送達地點</div>
            <div class="route-value">${safeText(order.dropoffAddress)}</div>
          </div>
        </div>
      </div>

      <div class="item-box">
        物品 / 任務內容：${safeText(order.item || order.itemName || order.itemNote || order.note)}
      </div>

      <button class="accept-btn" onclick="acceptTask('${order.id || order.orderId}', this)">
        接受任務
      </button>
    `;

    taskList.appendChild(card);
  }
}

async function acceptTask(orderDocId, btn){
  if(!confirm("確定要接受這張任務嗎？")) return;

  try{
    btn.disabled = true;
    btn.textContent = "接單中...";

    const res = await fetch("/api/rider/accept-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        orderId: orderDocId,
        lineUserId,
        riderId: riderProfile.riderId || "",
        riderName: riderProfile.name || "",
        riderPhone: riderProfile.phone || ""
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || data.message || "接單失敗");
    }

    alert("接單成功！");
    location.href = `/rider-order.html?orderId=${encodeURIComponent(orderDocId)}`;

  }catch(err){
    console.error(err);
    alert(err.message || "接單失敗，請稍後再試。");
    btn.disabled = false;
    btn.textContent = "接受任務";
  }
}

onlineBtn.addEventListener("click", toggleOnline);
locateBtn.addEventListener("click", recenterMap);

init();
</script>

</body>
</html>
