<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBee｜財務結算中心</title>
<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
}
.app{
  max-width:520px;
  margin:0 auto;
  padding:22px 16px 80px;
}
.title{
  font-size:28px;
  font-weight:1000;
  margin-bottom:6px;
}
.sub{
  color:#aaa;
  font-size:14px;
  font-weight:800;
  margin-bottom:20px;
}
.stat{
  background:#111;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}
.stat-label{
  color:#aaa;
  font-size:14px;
  font-weight:900;
}
.stat-value{
  font-size:34px;
  font-weight:1000;
  color:#facc15;
  margin-top:8px;
}
.card{
  background:#111;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:15px;
}
.row:last-child{
  border-bottom:none;
}
.label{
  color:#aaa;
  font-weight:800;
}
.value{
  font-weight:1000;
  text-align:right;
}
.fee{
  color:#22c55e;
  font-size:24px;
  font-weight:1000;
}
.btn{
  width:100%;
  border:0;
  border-radius:16px;
  padding:15px;
  margin-top:14px;
  background:#facc15;
  color:#111;
  font-size:17px;
  font-weight:1000;
}
.btn:disabled{
  opacity:.45;
}
.empty{
  text-align:center;
  color:#aaa;
  padding:30px 10px;
  font-weight:800;
  line-height:1.7;
}
.top-actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}

.top-actions .btn{
  margin-top:0;
  padding:12px 8px;
  font-size:14px;
}

@media (max-width:420px){
  .top-actions{
    grid-template-columns:1fr;
  }
}
.btn-dark{
  background:#222;
  color:#fff;
  border:1px solid rgba(255,255,255,.14);
}
</style>
</head>

<body>
<div class="app">
  <div class="title">UBee 財務結算中心</div>
  <div class="sub">管理騎士待撥款、街口支付結算與店家月結應收帳款。</div>

  <div class="top-actions">
  <button class="btn btn-dark" onclick="loadSettlements()">騎士待撥款</button>
  <button class="btn btn-dark" onclick="loadMerchantReceivables()">店家應收款</button>
  <button class="btn btn-dark" onclick="location.reload()">重載頁面</button>
</div>

  <div class="stat">
  <div class="stat-label" id="mainStatLabel">騎士待撥款總額</div>
  <div class="stat-value" id="pendingTotal">$0</div>
</div>

  <div id="list">
    <div class="empty">正在讀取待結算資料...</div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

function money(n){
  return "$" + Number(n || 0).toLocaleString("zh-TW");
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getPaymentText(method){
  const text = String(method || "").toLowerCase();

  if(text.includes("jko") || text.includes("街口")) return "街口支付";
  if(text.includes("cash") || text.includes("現金")) return "現金";
  if(text.includes("merchant")) return "店家月結";
  if(text.includes("platform")) return "平台收款";

  return method || "未設定";
}

function formatTime(value){
  if(!value) return "-";

  try{
    if(value._seconds){
      return new Date(value._seconds * 1000).toLocaleString("zh-TW");
    }

    if(value.seconds){
      return new Date(value.seconds * 1000).toLocaleString("zh-TW");
    }

    return new Date(value).toLocaleString("zh-TW");
  }catch(e){
    return "-";
  }
}

async function loadSettlements(){
  const list = document.getElementById("list");
  const pendingTotal = document.getElementById("pendingTotal");
  const mainStatLabel = document.getElementById("mainStatLabel");

  if(mainStatLabel){
    mainStatLabel.innerText = "騎士待撥款總額";
  }

  pendingTotal.innerText = "$0";
  list.innerHTML = `<div class="empty">正在讀取騎士待撥款資料...</div>`;
  try{
    const res = await fetch(`${API_BASE}/api/admin/pending-settlements?t=${Date.now()}`);
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || data.error || "讀取失敗");
    }

    pendingTotal.innerText = money(data.pendingTotal || 0);

    const orders = Array.isArray(data.orders) ? data.orders : [];

    if(!orders.length){
      list.innerHTML = `<div class="empty">目前沒有待結算訂單。</div>`;
      return;
    }

    list.innerHTML = orders.map(order => `
      <div class="card">
        <div class="row">
          <div class="label">訂單編號</div>
          <div class="value">${escapeHtml(order.orderNo || order.id || "-")}</div>
        </div>

        <div class="row">
          <div class="label">騎士</div>
          <div class="value">${escapeHtml(order.riderName || order.driverName || order.riderId || "-")}</div>
        </div>

        <div class="row">
          <div class="label">付款方式</div>
          <div class="value">${escapeHtml(getPaymentText(order.paymentMethod || order.payMethod || order.paymentType))}</div>
        </div>

        <div class="row">
          <div class="label">完成時間</div>
          <div class="value">${escapeHtml(formatTime(order.completedAt || order.updatedAt))}</div>
        </div>

        <div class="row">
          <div class="label">騎士收入</div>
          <div class="fee">${money(order.riderFee || order.driverFee || order.fee || 0)}</div>
        </div>

        <button class="btn" onclick="settleOrder('${escapeHtml(order.id)}', this)">
          完成結算
        </button>
      </div>
    `).join("");

  }catch(err){
    console.error(err);
    list.innerHTML = `<div class="empty">讀取失敗：${escapeHtml(err.message)}</div>`;
  }
}

async function settleOrder(orderId, btn){
  if(!orderId){
    alert("缺少訂單 ID");
    return;
  }

  const ok = confirm("確認已經撥款給騎士？\n\n確認後，這筆訂單會從待結算轉為已結算。");
  if(!ok) return;

  btn.disabled = true;
  btn.innerText = "結算中...";

  try{
    const res = await fetch(`${API_BASE}/api/admin/settle-order`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ orderId })
    });

    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || data.error || "結算失敗");
    }

    alert("已完成結算");
    await loadSettlements();

  }catch(err){
    console.error(err);
    alert("結算失敗：" + err.message);
    btn.disabled = false;
    btn.innerText = "完成結算";
  }
}

async function loadMerchantReceivables(){
  const list = document.getElementById("list");
  const pendingTotal = document.getElementById("pendingTotal");
  const mainStatLabel = document.getElementById("mainStatLabel");

  if(mainStatLabel){
    mainStatLabel.innerText = "店家未結清總額";
  }

  pendingTotal.innerText = "$0";
  list.innerHTML = `<div class="empty">正在讀取店家應收帳款...</div>`;

  try{
    const res = await fetch(`${API_BASE}/api/admin/merchant-receivables?t=${Date.now()}`);
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || data.error || "讀取失敗");
    }

    pendingTotal.innerText = money(data.unpaidTotal || 0);

    const merchants = Array.isArray(data.merchants)
  ? data.merchants.filter(merchant => Number(merchant.unpaidAmount || 0) > 0)
  : [];

    if(!merchants.length){
      list.innerHTML = `<div class="empty">目前沒有店家未結清帳款。</div>`;
      return;
    }

    list.innerHTML = merchants.map(merchant => `
      <div class="card">
        <div class="row">
          <div class="label">店家名稱</div>
          <div class="value">${escapeHtml(merchant.merchantName || "-")}</div>
        </div>

        <div class="row">
          <div class="label">店家電話</div>
          <div class="value">${escapeHtml(merchant.merchantPhone || "-")}</div>
        </div>

        <div class="row">
          <div class="label">未結清金額</div>
          <div class="fee">${money(merchant.unpaidAmount || 0)}</div>
        </div>

        <div class="row">
          <div class="label">未結清筆數</div>
          <div class="value">${Number(merchant.unpaidCount || 0)} 筆</div>
        </div>

        <div class="row">
          <div class="label">已結清金額</div>
          <div class="value">${money(merchant.paidAmount || 0)}</div>
        </div>

        ${(merchant.orders || []).length ? `
          <div class="row">
            <div class="label">未結清明細</div>
            <div class="value">${Number((merchant.orders || []).length)} 筆</div>
          </div>
        ` : ""}

        ${(merchant.orders || []).map(order => `
          <div class="card" style="background:#181818;margin-top:12px;">
            <div class="row">
              <div class="label">訂單編號</div>
              <div class="value">${escapeHtml(order.orderNo || order.id || "-")}</div>
            </div>

            <div class="row">
              <div class="label">應收金額</div>
              <div class="fee">${money(order.amount || 0)}</div>
            </div>

            <div class="row">
              <div class="label">完成時間</div>
              <div class="value">${escapeHtml(formatTime(order.completedAt || order.createdAt))}</div>
            </div>

            <div class="row">
              <div class="label">付款方式</div>
              <div class="value">${escapeHtml(getPaymentText(order.paymentMethod || order.paymentMethodLabel))}</div>
            </div>

            <button class="btn" onclick="settleMerchantReceivable('${escapeHtml(order.id)}', this)">
              標記店家已結清
            </button>
          </div>
        `).join("")}
      </div>
    `).join("");

  }catch(err){
    console.error(err);
    list.innerHTML = `<div class="empty">讀取店家帳款失敗：${escapeHtml(err.message)}</div>`;
  }
}

async function settleMerchantReceivable(orderId, btn){
  if(!orderId){
    alert("缺少訂單 ID");
    return;
  }

  const ok = confirm("確認店家已完成付款？\n\n確認後，這筆店家應收款會標記為已結清。");
  if(!ok) return;

  btn.disabled = true;
  btn.innerText = "結清中...";

  try{
    const res = await fetch(`${API_BASE}/api/admin/merchant-receivables/settle-order`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ orderId })
    });

    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || data.error || "結清失敗");
    }

    alert("店家帳款已標記結清");
    await loadMerchantReceivables();

  }catch(err){
    console.error(err);
    alert("店家帳款結清失敗：" + err.message);
    btn.disabled = false;
    btn.innerText = "標記店家已結清";
  }
}
  
loadSettlements();
</script>
</body>
</html>
