<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UBee｜騎士導航任務</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root{
  --bg:#000;
  --card:#111;
  --card2:#181818;
  --line:rgba(255,255,255,.12);
  --text:#fff;
  --muted:#a8a8a8;
  --green:#22c55e;
  --blue:#2563eb;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  overflow:hidden;
}

#map{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  background:#111;
  z-index:1;
}

.top-bar{
  position:fixed;
  top:14px;
  left:14px;
  right:14px;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.pill{
  background:rgba(0,0,0,.78);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:10px 14px;
  font-size:14px;
  font-weight:900;
  backdrop-filter:blur(12px);
}

.locate-btn{
  position:fixed;
  right:16px;
  bottom:150px;
  z-index:12;
  width:52px;
  height:52px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.82);
  color:#fff;
  font-size:20px;
}

.menu-btn{
  position:fixed;
  right:16px;
  bottom:84px;
  z-index:12;
  width:52px;
  height:52px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.86);
  color:#fff;
  font-size:25px;
  font-weight:950;
}

.action-wrap{
  position:fixed;
  left:16px;
  right:16px;
  bottom:calc(18px + env(safe-area-inset-bottom));
  z-index:20;
}

.action-btn{
  width:100%;
  height:64px;
  border:none;
  border-radius:999px;
  background:var(--green);
  color:#fff;
  font-size:20px;
  font-weight:950;
  box-shadow:0 12px 34px rgba(0,0,0,.42);
}

.action-btn.secondary{
  background:#1f1f1f;
  border:1px solid rgba(255,255,255,.16);
}

.detail-panel{
  position:fixed;
  right:12px;
  bottom:148px;
  width:min(360px, calc(100vw - 24px));
  max-height:62vh;
  overflow:auto;
  z-index:30;
  background:rgba(12,12,12,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:24px;
  padding:16px;
  box-shadow:0 16px 46px rgba(0,0,0,.55);
}

.detail-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.detail-title{
  font-size:20px;
  font-weight:950;
}

.close-detail{
  width:42px;
  height:42px;
  border:0;
  border-radius:999px;
  background:#242424;
  color:#fff;
  font-size:24px;
  font-weight:900;
}

.status{
  padding:12px 14px;
  border-radius:14px;
  background:var(--card2);
  border:1px solid var(--line);
  color:var(--muted);
  font-size:14px;
  margin-bottom:12px;
}

.error{
  color:#ffb4b4;
  border-color:rgba(239,68,68,.35);
  background:rgba(239,68,68,.12);
}

.row{
  padding:11px 0;
  border-top:1px solid var(--line);
}

.row:first-child{
  border-top:0;
}

.label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:5px;
}

.value{
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
}

.refresh-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:14px;
  margin-top:12px;
  font-size:16px;
  font-weight:950;
  background:#1f1f1f;
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
}

.hidden{display:none}
</style>
</head>

<body>

<div id="map"></div>

<div class="top-bar">
  <div class="pill">UBee 導航</div>
  <div id="topStatus" class="pill">任務中</div>
</div>

<button id="locateBtn" class="locate-btn">◎</button>
<button id="menuBtn" class="menu-btn">☰</button>

<div id="detailPanel" class="detail-panel hidden">
  <div class="detail-top">
    <div class="detail-title">任務明細</div>
    <button id="closeDetailBtn" class="close-detail">×</button>
  </div>

  <div class="status" id="statusBox">正在初始化導航系統...</div>

  <div class="row">
    <div class="label">訂單編號</div>
    <div class="value" id="orderIdText">-</div>
  </div>

  <div class="row">
    <div class="label">目前目的地</div>
    <div class="value" id="targetText">-</div>
  </div>

  <div class="row">
    <div class="label">預估導航</div>
    <div class="value" id="routeText">-</div>
  </div>

  <div class="row">
    <div class="label">取件地點</div>
    <div class="value" id="pickupText">-</div>
  </div>

  <div class="row">
    <div class="label">送達地點</div>
    <div class="value" id="dropoffText">-</div>
  </div>

  <div class="row">
    <div class="label">物品內容</div>
    <div class="value" id="itemText">-</div>
  </div>

  <button id="refreshBtn" class="refresh-btn">重新整理導航</button>
</div>

<div class="action-wrap">
  <button id="mainActionBtn" class="action-btn">載入中...</button>
</div>

<script>
const LIFF_ID = "2009895876-hiq8YW0n";
const COMPLETED_REDIRECT_URL = "/rider-task.html";

let lineUserId = "";
let orderId = "";
let order = null;

let map = null;
let riderMarker = null;
let currentPosition = null;

let directionsService = null;
let directionsRenderer = null;
let watchId = null;
let routeTimer = null;

const statusBox = document.getElementById("statusBox");
const topStatus = document.getElementById("topStatus");
const mainActionBtn = document.getElementById("mainActionBtn");
const detailPanel = document.getElementById("detailPanel");

function setStatus(text, isError = false){
  statusBox.textContent = text;
  statusBox.className = isError ? "status error" : "status";
}

function safeText(value){
  return value || "未填寫";
}

function openGoogleNavigation(destination){
  if(!destination) return;

  const url =
    `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&travelmode=driving`;

  try{
    if(window.liff && liff.isInClient()){
      liff.openWindow({
        url,
        external:true
      });
    }else{
      window.open(url, "_blank");
    }
  }catch(err){
    window.open(url, "_blank");
  }
}

async function init(){
  try{
    setStatus("正在啟動 LIFF...");
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    const params = new URLSearchParams(location.search);
    orderId = params.get("orderId");

    if(!orderId){
      throw new Error("缺少訂單編號");
    }

    setStatus("正在載入 Google Maps...");
    await initMap();

    setStatus("正在載入任務資料...");
    await loadOrder();

    await autoAcceptIfNeeded();

    startLocationTracking();
    startAutoRouteRefresh();

  }catch(err){
    console.error(err);
    setStatus("初始化失敗：" + (err.message || JSON.stringify(err)), true);
    mainActionBtn.textContent = "載入失敗";
    mainActionBtn.className = "action-btn secondary";
  }
}

async function initMap(){
  const configRes = await fetch("/api/config");
  const config = await configRes.json();

  if(!config.googleMapsApiKey){
    throw new Error("缺少 Google Maps API Key");
  }

  await loadGoogleMaps(config.googleMapsApiKey);

  const position = await getCurrentPosition();

  currentPosition = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  map = new google.maps.Map(document.getElementById("map"), {
    center: currentPosition,
    zoom: 16,
    disableDefaultUI: true,
    gestureHandling: "greedy",
    styles: [
      { elementType: "geometry", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#1d1d1d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#8f8f8f" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#2b2b2b" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0b1720" }] },
      { featureType: "poi", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "off" }] }
    ]
  });

  riderMarker = new google.maps.Marker({
    position: currentPosition,
    map,
    title: "目前位置",
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 9,
      fillColor: "#2563eb",
      fillOpacity: 1,
      strokeColor: "#ffffff",
      strokeWeight: 3
    }
  });

  directionsService = new google.maps.DirectionsService();

  directionsRenderer = new google.maps.DirectionsRenderer({
    map,
    suppressMarkers: false,
    preserveViewport: false,
    polylineOptions: {
      strokeColor: "#22c55e",
      strokeWeight: 6,
      strokeOpacity: .95
    }
  });
}

function loadGoogleMaps(key){
  return new Promise((resolve, reject) => {
    if(window.google && window.google.maps){
      resolve();
      return;
    }

    window.gm_authFailure = function(){
      reject(new Error("Google Maps 金鑰授權失敗，請檢查 Billing、API 限制、網域限制"));
    };

    window.initGoogleMapScript = function(){
      resolve();
    };

    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=initGoogleMapScript&v=weekly`;
    script.async = true;
    script.defer = true;
    script.onerror = () => reject(new Error("Google Maps 載入失敗"));
    document.head.appendChild(script);
  });
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation){
      reject(new Error("此裝置不支援定位"));
      return;
    }

    navigator.geolocation.getCurrentPosition(resolve, () => {
      reject(new Error("定位失敗，請允許位置權限"));
    }, {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    });
  });
}

async function loadOrder(){
  const res = await fetch(`/api/orders/${encodeURIComponent(orderId)}`);
  const data = await res.json();

  if(!data.success){
    throw new Error(data.error || "讀取任務失敗");
  }

  order = data.order;

  renderOrderInfo();
  renderMainAction(order.status);
  await drawRouteByStatus(true);
}

async function autoAcceptIfNeeded(){
  if(!order) return;

  const canAutoAccept = [
    "pending_dispatch",
    "pending",
    "dispatching"
  ].includes(order.status);

  if(!canAutoAccept) return;

  setStatus("系統已接收任務，正在進入導航...");

  const ok = await updateStatusOnly("accepted");

  if(ok){
    await loadOrder();
    openGoogleNavigation(order.pickupAddress);
  }
}

function renderOrderInfo(){
  document.getElementById("orderIdText").textContent = order.id || order.orderId || orderId;
  document.getElementById("pickupText").textContent = safeText(order.pickupAddress);
  document.getElementById("dropoffText").textContent = safeText(order.dropoffAddress);
  document.getElementById("itemText").textContent = safeText(order.item || order.itemName || order.content);

  topStatus.textContent = order.statusLabel || order.status || "任務中";

  if(order.status === "accepted"){
    document.getElementById("targetText").textContent = safeText(order.pickupAddress);
  }else if(order.status === "arrived_pickup"){
    document.getElementById("targetText").textContent = safeText(order.pickupAddress);
  }else if(order.status === "picked_up"){
    document.getElementById("targetText").textContent = safeText(order.dropoffAddress);
  }else if(order.status === "arrived_dropoff"){
    document.getElementById("targetText").textContent = safeText(order.dropoffAddress);
  }else if(order.status === "completed"){
    document.getElementById("targetText").textContent = "準備返回等待派單";
  }else{
    document.getElementById("targetText").textContent = "-";
  }
}

function renderMainAction(status){
  mainActionBtn.disabled = false;
  mainActionBtn.className = "action-btn";

  if(status === "accepted"){
    mainActionBtn.textContent = "已抵達取件地";
    mainActionBtn.onclick = () => updateStatus("arrived_pickup");
    return;
  }

  if(status === "arrived_pickup"){
    mainActionBtn.textContent = "已取件，導航到送達地";
    mainActionBtn.onclick = () => updateStatus("picked_up");
    return;
  }

  if(status === "picked_up"){
    mainActionBtn.textContent = "已抵達送達地";
    mainActionBtn.onclick = () => updateStatus("arrived_dropoff");
    return;
  }

  if(status === "arrived_dropoff"){
    mainActionBtn.textContent = "任務完成";
    mainActionBtn.onclick = () => updateStatus("completed");
    return;
  }

  if(status === "completed"){
    mainActionBtn.textContent = "回到等待派單";
    mainActionBtn.className = "action-btn secondary";
    mainActionBtn.onclick = () => {
      location.href = COMPLETED_REDIRECT_URL;
    };
    return;
  }

  mainActionBtn.textContent = "重新整理任務";
  mainActionBtn.className = "action-btn secondary";
  mainActionBtn.onclick = () => loadOrder();
}

function getDestinationByStatus(){
  if(!order) return "";

  if(order.status === "accepted" || order.status === "arrived_pickup"){
    return order.pickupAddress || "";
  }

  if(order.status === "picked_up" || order.status === "arrived_dropoff"){
    return order.dropoffAddress || "";
  }

  return "";
}

async function drawRouteByStatus(forcePan = false){
  if(!currentPosition || !order || !directionsService || !directionsRenderer) return;

  const destination = getDestinationByStatus();

  if(!destination){
    directionsRenderer.setDirections({ routes: [] });
    document.getElementById("routeText").textContent = "目前不需要導航";
    return;
  }

  setStatus("正在規劃路線...");

  directionsService.route({
    origin: currentPosition,
    destination,
    travelMode: google.maps.TravelMode.DRIVING,
    region: "TW"
  }, (result, status) => {
    if(status !== "OK"){
      console.error("Directions failed:", status);
      setStatus("路線規劃失敗，請稍後重試", true);
      document.getElementById("routeText").textContent = "路線規劃失敗";
      return;
    }

    directionsRenderer.setDirections(result);

    const leg = result.routes?.[0]?.legs?.[0];

    if(leg){
      document.getElementById("routeText").textContent = `${leg.duration.text}｜${leg.distance.text}`;

      if(order.status === "accepted"){
        setStatus(`取件導航：${leg.duration.text}，${leg.distance.text}`);
      }else if(order.status === "picked_up"){
        setStatus(`送達導航：${leg.duration.text}，${leg.distance.text}`);
      }else{
        setStatus(`路線已規劃：${leg.duration.text}，${leg.distance.text}`);
      }

      if(forcePan && map){
        map.panTo(currentPosition);
      }
    }else{
      document.getElementById("routeText").textContent = "路線已規劃";
      setStatus("路線已規劃");
    }
  });
}

function startLocationTracking(){
  if(!navigator.geolocation) return;

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    currentPosition = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    if(riderMarker){
      riderMarker.setPosition(currentPosition);
    }

  }, (err) => {
    console.warn("位置追蹤失敗", err);
  }, {
    enableHighAccuracy: true,
    maximumAge: 3000,
    timeout: 10000
  });
}

function startAutoRouteRefresh(){
  if(routeTimer){
    clearInterval(routeTimer);
  }

  routeTimer = setInterval(() => {
    if(order && currentPosition){
      drawRouteByStatus(false);
    }
  }, 30000);
}

async function recenterMap(){
  const position = await getCurrentPosition();

  currentPosition = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  if(map){
    map.panTo(currentPosition);
    map.setZoom(16);
  }

  if(riderMarker){
    riderMarker.setPosition(currentPosition);
  }

  await drawRouteByStatus(true);
}

async function updateStatusOnly(status){
  const res = await fetch("/api/rider/update-order-status", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      orderId,
      lineUserId,
      status
    })
  });

  const data = await res.json();

  if(!data.success){
    alert(data.error || "更新失敗");
    return false;
  }

  return true;
}

async function updateStatus(status){
  try{
    mainActionBtn.disabled = true;
    mainActionBtn.textContent = "更新中...";

    const ok = await updateStatusOnly(status);

    if(!ok){
      renderMainAction(order.status);
      return;
    }

    if(status === "completed"){
      setStatus("任務完成，正在回到等待派單...");
      mainActionBtn.textContent = "返回中...";

      setTimeout(() => {
        location.href = COMPLETED_REDIRECT_URL;
      }, 500);

      return;
    }

    await loadOrder();

    if(status === "picked_up"){
      setStatus("已取件，正在開啟 Google Maps 導航到送達地...");
      openGoogleNavigation(order.dropoffAddress);
      await drawRouteByStatus(true);
    }

    if(status === "arrived_pickup"){
      setStatus("已抵達取件地，請完成取件後繼續。");
    }

    if(status === "arrived_dropoff"){
      setStatus("已抵達送達地，確認交付後可完成任務。");
    }

  }catch(err){
    console.error(err);
    alert("更新失敗，請稍後再試");
    if(order){
      renderMainAction(order.status);
    }
  }
}

document.getElementById("menuBtn").addEventListener("click", () => {
  detailPanel.classList.toggle("hidden");
});

document.getElementById("closeDetailBtn").addEventListener("click", () => {
  detailPanel.classList.add("hidden");
});

document.getElementById("refreshBtn").addEventListener("click", async () => {
  await recenterMap();
});

document.getElementById("locateBtn").addEventListener("click", async () => {
  await recenterMap();
});

window.addEventListener("beforeunload", () => {
  if(watchId !== null){
    navigator.geolocation.clearWatch(watchId);
  }

  if(routeTimer){
    clearInterval(routeTimer);
  }
});

init();
</script>

</body>
</html>
