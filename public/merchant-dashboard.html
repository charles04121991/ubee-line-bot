<style>

body{

.logo span{color:var(--yellow)}

label{

textarea{

input:focus,textarea:focus,select:focus{

  border:0;

}

}
.order h3{

.row{

.notice{

}
.error{

<body>
<div class="wrap">

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCNuP9x_GWDjmJx0-xyO316fa6jiFSfa-s",
  authDomain: "ubee-oms.firebaseapp.com",
  projectId: "ubee-oms"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

const MERCHANT_LIFF_ID = "2009895876-8UhPutRu";
const STORAGE_KEY = "ubee_merchant_dashboard_key";
const MERCHANT_SERVICE_FEE = 100;

let merchantLineUserId = "";
let merchantKey = "";
let currentMerchant = null;
let merchantAuthed = false;

let currentTab = "merchant_pending";
let ordersMap = {};
let unsubscribers = [];

const deliveryStatuses = [
  "pending_dispatch",
  "accepted",
  "arrived_pickup",
  "picked_up",
  "arrived_dropoff"
];

const statusTextMap = {
  merchant_pending: "店家待接單",
  merchant_preparing: "店家準備中",
  merchant_ready: "店家已完成，待派遣騎士",
  merchant_self_delivery: "店家自送",
  delivery_progress: "配送中",

  pending_dispatch: "已派遣，等待騎士接單",
  accepted: "騎士已接單，前往店家",
  arrived_pickup: "騎士已到店家",
  picked_up: "騎士已取件，配送中",
  arrived_dropoff: "騎士已到送達地點",
  completed: "已完成送達"
};

function normalizePhone(str){
  return String(str || "").replace(/\D/g, "");
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function hideError(){
  const box = document.getElementById("errorBox");
  box.style.display = "none";
  box.textContent = "";
}

function showError(message){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent = message;
}

function forceEnableLoginButton(text){
  const loginBtn = document.getElementById("loginBtn");
  if(loginBtn && !merchantAuthed){
    loginBtn.disabled = false;
    loginBtn.removeAttribute("disabled");
    loginBtn.style.pointerEvents = "auto";
    loginBtn.textContent = text || "進入派單中心";
  }
}

function showCreateOrderMsg(type, message){
  const box = document.getElementById("createOrderMsg");
  box.className = "formMsg " + type;
  box.textContent = message;
}

function clearCreateOrderMsg(){
  const box = document.getElementById("createOrderMsg");
  box.className = "formMsg";
  box.textContent = "";
}

async function initMerchantLiff(){
  hideError();

  if(typeof liff === "undefined"){
    showError("LINE LIFF 載入失敗，請從店家合作中心官方帳號重新開啟。");
    forceEnableLoginButton("進入派單中心");
    return;
  }

  try{
    await liff.init({
      liffId: MERCHANT_LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    merchantLineUserId = profile.userId || "";

    if(!merchantLineUserId){
      showError("無法取得 LINE 使用者資料，請重新開啟店家派單中心。");
      forceEnableLoginButton("進入派單中心");
      return;
    }

    console.log("✅ 店家 LIFF userId:", merchantLineUserId);

  }catch(err){
    console.error("店家 LIFF 初始化失敗:", err);
    showError("店家登入初始化失敗，請從店家合作中心官方帳號重新開啟。");
    forceEnableLoginButton("進入派單中心");
  }
}

function enterMerchantDashboard(merchant){
  currentMerchant = {
    ...merchant,
    merchantId: merchant.merchantId || merchant.id || "",
    merchantName: merchant.merchantName || "",
    merchantPhone: merchant.phone || merchant.merchantPhone || "",
    merchantAddress: merchant.pickupAddress || merchant.merchantAddress || "",
    merchantType: merchant.businessType || merchant.merchantType || "",
    settlementType: merchant.settlementType || "",
    status: merchant.status || "",
    approved: merchant.approved === true
  };

  merchantKey =
    currentMerchant.merchantPhone ||
    currentMerchant.merchantId ||
    currentMerchant.id ||
    "";

  merchantAuthed = true;

  if(merchantKey){
    localStorage.setItem(STORAGE_KEY, merchantKey);
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("welcomeTitle").textContent =
    `${currentMerchant.merchantName || "店家"}｜派單中心`;

  document.getElementById("merchantInfoBox").innerHTML = `
    <strong>${escapeHtml(currentMerchant.merchantName || "未命名店家")}</strong><br>
    店家電話：${escapeHtml(currentMerchant.merchantPhone || "未設定")}<br>
    店家地址：${escapeHtml(currentMerchant.merchantAddress || "未設定")}<br>
    店家類型：${escapeHtml(currentMerchant.merchantType || "未設定")}<br>
    狀態：${currentMerchant.approved ? "已審核通過" : escapeHtml(currentMerchant.status || "未設定")}
  `;

  renderDispatchAutoInfo();
  startListenOrders();
}

async function loadMerchantProfile(){
  if(!merchantLineUserId){
    showError("缺少 LINE 使用者資料，請從店家合作中心官方帳號重新開啟。");
    forceEnableLoginButton("進入派單中心");
    return;
  }

  try{
    const res = await fetch(`/api/merchant/profile?lineUserId=${encodeURIComponent(merchantLineUserId)}`);
    const data = await res.json().catch(() => ({}));

    if(data.ok && data.merchant){
      enterMerchantDashboard(data.merchant);
      return;
    }

    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");

    document.querySelector("#loginBox h2").textContent = "店家帳號綁定";

    const label = document.getElementById("merchantKeyLabel");
    if(label){
      label.textContent = "申請合作時填寫的手機號碼";
    }

    const input = document.getElementById("merchantKey");
    input.placeholder = "請輸入申請合作時填寫的手機號碼";
    input.type = "tel";
    input.inputMode = "tel";

    const notice = document.querySelector("#loginBox .notice");
    if(notice){
      notice.textContent = "審核通過的店家，第一次使用時請輸入申請合作時填寫的手機號碼完成 LINE 綁定。";
    }

    forceEnableLoginButton("進入派單中心");

  }catch(err){
    console.error("讀取店家資料失敗:", err);
    showError("讀取店家資料失敗，請稍後再試。");
    forceEnableLoginButton("進入派單中心");
  }
}

function getOrderTime(order){
  const t = order.createdAt;

  if(t && typeof t.toDate === "function"){
    return t.toDate().getTime();
  }

  if(typeof t === "number"){
    return t;
  }

  return 0;
}

function formatTime(order){
  const t = order.createdAt;
  let d = null;

  if(t && typeof t.toDate === "function"){
    d = t.toDate();
  }else if(typeof t === "number"){
    d = new Date(t);
  }else if(typeof t === "string"){
    d = new Date(t);
  }

  if(!d || isNaN(d.getTime())){
    return "未記錄";
  }

  const pad = n => String(n).padStart(2,"0");
  return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function generateMerchantOrderNo(){
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  const yyyy = d.getFullYear();
  const mm = pad(d.getMonth()+1);
  const dd = pad(d.getDate());
  const hh = pad(d.getHours());
  const mi = pad(d.getMinutes());
  const ss = pad(d.getSeconds());
  const rand = Math.floor(Math.random() * 900 + 100);
  return `UBM${yyyy}${mm}${dd}${hh}${mi}${ss}${rand}`;
}

function renderDispatchAutoInfo(){
  const box = document.getElementById("dispatchAutoInfo");
  if(!box) return;

  if(!currentMerchant){
    box.innerHTML = "店家資料尚未載入";
    return;
  }

  box.innerHTML = `
    <strong>自動帶入取件資料</strong><br>
    店家名稱：${escapeHtml(currentMerchant.merchantName || "未設定")}<br>
    店家電話：${escapeHtml(currentMerchant.merchantPhone || "未設定")}<br>
    取件地址：${escapeHtml(currentMerchant.merchantAddress || "未設定")}
  `;
}

function resetCreateOrderForm(){
  document.getElementById("newCustomerName").value = "";
  document.getElementById("newCustomerPhone").value = "";
  document.getElementById("newDropoffAddress").value = "";
  document.getElementById("newItemName").value = "";
  document.getElementById("newAdvanceAmount").value = "0";
  document.getElementById("newDeliveryMode").value = "ubee";
  document.getElementById("newPaymentMethod").value = "merchant_settlement";
  document.getElementById("newNote").value = "";
}

async function createMerchantOrder(){
  clearCreateOrderMsg();

  if(!currentMerchant || !merchantAuthed){
    showCreateOrderMsg("err", "店家資料尚未完成登入，請重新開啟店家派單中心。");
    return;
  }

  const customerName = document.getElementById("newCustomerName").value.trim();
  const customerPhone = normalizePhone(document.getElementById("newCustomerPhone").value);
  const dropoffAddress = document.getElementById("newDropoffAddress").value.trim();
  const itemName = document.getElementById("newItemName").value.trim();
  const advanceAmount = Math.round(Number(document.getElementById("newAdvanceAmount").value || 0));
  const deliveryFee = MERCHANT_SERVICE_FEE;
  const deliveryMode = document.getElementById("newDeliveryMode").value || "ubee";
  const paymentMethod = document.getElementById("newPaymentMethod").value || "merchant_settlement";
  const note = document.getElementById("newNote").value.trim();

  const deliveryModeLabelMap = {
    ubee: "UBee 派騎士",
    merchant: "店家自送"
  };

  const paymentMethodLabelMap = {
    merchant_settlement: "店家月結 / 週結",
    cash: "現金付款",
    merchant_paid: "店家已收款"
  };

  const paymentStatusMap = {
    merchant_settlement: "merchant_settlement",
    cash: "cash_on_delivery",
    merchant_paid: "paid_by_merchant"
  };

  const orderStatus = deliveryMode === "merchant"
    ? "merchant_self_delivery"
    : "merchant_ready";

  if(!customerName || !customerPhone || !dropoffAddress || !itemName){
    showCreateOrderMsg("err", "請確認客人姓名、電話、送達地址、品項內容都有填寫。");
    return;
  }

  if(!/^09\d{8}$/.test(customerPhone)){
    showCreateOrderMsg("err", "請輸入正確的客人手機格式，例如：0912345678。");
    return;
  }

  if(advanceAmount < 0){
    showCreateOrderMsg("err", "代墊金額不可小於 0。");
    return;
  }

  if(!currentMerchant.merchantPhone || !currentMerchant.merchantAddress){
    showCreateOrderMsg("err", "店家電話或取件地址未設定，請先確認店家資料。");
    return;
  }

  const btn = document.getElementById("createOrderBtn");
  btn.disabled = true;
  btn.textContent = "建立中...";

  try{
    const orderNo = generateMerchantOrderNo();
    const now = firebase.firestore.FieldValue.serverTimestamp();

    const merchantId = currentMerchant.merchantId || currentMerchant.id || merchantKey || "";
    const merchantName = currentMerchant.merchantName || "";
    const merchantPhone = currentMerchant.merchantPhone || "";
    const pickupAddress = currentMerchant.merchantAddress || "";

    const orderPayload = {
      orderNo,
      source: "merchant-dashboard",
      createdFrom: "merchant-dashboard",
      orderType: "merchant_dispatch",

      status: orderStatus,
      deliveryType: deliveryMode,
      deliveryTypeLabel: deliveryModeLabelMap[deliveryMode] || "UBee 派騎士",

      createdAt: now,
      updatedAt: now,
      merchantCreatedAt: now,

      merchantId,
      merchantCode: merchantId,
      merchantName,
      merchantPhone,
      merchantAddress: pickupAddress,
      settlementType: currentMerchant.settlementType || "",

      pickupName: merchantName,
      pickupPhone: merchantPhone,
      pickupAddress,
      pickup: pickupAddress,

      customerName,
      receiverName: customerName,
      customerPhone,
      dropoffPhone: customerPhone,
      dropoffAddress,
      dropoff: dropoffAddress,

      itemName,
      item: itemName,
      serviceType: "店家派單",

      note,
      customerNote: note,
      merchantNote: note,

      advanceAmount,
      merchantServiceFee: MERCHANT_SERVICE_FEE,

      totalFee: deliveryFee,
      total: deliveryFee,
      merchantFee: deliveryFee,
      riderFee: deliveryFee,
      driverFee: deliveryFee,
      price: deliveryFee,
      fee: deliveryFee,
      deliveryFee,

      paymentMethod,
      paymentMethodLabel: paymentMethodLabelMap[paymentMethod] || "店家月結 / 週結",
      paymentStatus: paymentStatusMap[paymentMethod] || "merchant_settlement",
      merchantPaid: paymentMethod === "merchant_paid",
      paidAmount: paymentMethod === "merchant_paid" ? deliveryFee : 0,

      riderLineUserId: "",
      riderName: "",
      riderPhone: ""
    };

    if(deliveryMode === "ubee"){
      orderPayload.merchantReadyAt = now;
    }

    if(deliveryMode === "merchant"){
      orderPayload.selfDeliveryAt = now;
    }

    await db.collection("orders").doc(orderNo).set(orderPayload, { merge:true });

    if(deliveryMode === "merchant"){
      showCreateOrderMsg("ok", `自送訂單已建立，不會派遣 UBee 騎士。訂單編號：${orderNo}`);
      resetCreateOrderForm();
      setTab("merchant_self_delivery");
    }else{
      showCreateOrderMsg("ok", `派單已建立，已放入「待派遣」。訂單編號：${orderNo}`);
      resetCreateOrderForm();
      setTab("merchant_ready");
    }

  }catch(err){
    console.error("建立店家派單失敗:", err);
    showCreateOrderMsg("err", "建立派單失敗，請稍後再試。");
  }finally{
    btn.disabled = false;
    btn.textContent = "建立訂單";
  }
}

async function loginMerchant(){
  hideError();

  const input = document.getElementById("merchantKey");
  const loginBtn = document.getElementById("loginBtn");
  const phone = normalizePhone(input.value);

  if(!merchantLineUserId){
    showError("缺少 LINE 使用者資料，請從店家合作中心官方帳號重新開啟店家派單。");
    forceEnableLoginButton("進入派單中心");
    return;
  }

  if(!/^09\d{8}$/.test(phone)){
    showError("請輸入申請合作時填寫的手機號碼，例如：0912345678。");
    forceEnableLoginButton("進入派單中心");
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "綁定中...";

  try{
    const res = await fetch("/api/merchant/bind", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone,
        lineUserId: merchantLineUserId
      })
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok || !data.ok){
      throw new Error(data.message || "店家帳號綁定失敗，請稍後再試。");
    }

    enterMerchantDashboard(data.merchant);

  }catch(err){
    console.error("店家綁定失敗:", err);
    showError(err.message || "店家綁定失敗，請稍後再試。");
    forceEnableLoginButton("進入派單中心");
  }finally{
    if(!merchantAuthed){
      forceEnableLoginButton("進入派單中心");
    }
  }
}

function logoutMerchant(){
  localStorage.removeItem(STORAGE_KEY);
  merchantKey = "";
  currentMerchant = null;
  merchantAuthed = false;
  currentTab = "merchant_pending";
  ordersMap = {};
  stopListenOrders();

  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("ordersBox").innerHTML = "";
  document.getElementById("merchantInfoBox").innerHTML = "";
  document.getElementById("dispatchAutoInfo").innerHTML = "店家資料尚未載入";

  forceEnableLoginButton("進入派單中心");
  setTab("merchant_pending");
}

function stopListenOrders(){
  unsubscribers.forEach(fn => {
    try{ fn(); }catch(e){}
  });
  unsubscribers = [];
}

function startListenOrders(){
  stopListenOrders();

  const statuses = [
    "merchant_pending",
    "merchant_preparing",
    "merchant_ready",
    "merchant_self_delivery",
    "pending_dispatch",
    "accepted",
    "arrived_pickup",
    "picked_up",
    "arrived_dropoff",
    "completed"
  ];

  statuses.forEach(status => {
    const unsub = db.collection("orders")
      .where("status", "==", status)
      .limit(50)
      .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          if(change.type === "removed"){
            delete ordersMap[change.doc.id];
          }else{
            ordersMap[change.doc.id] = {
              id: change.doc.id,
              ...change.doc.data()
            };
          }
        });

        renderOrders();
      }, err => {
        console.error("讀取訂單失敗:", err);
      });

    unsubscribers.push(unsub);
  });
}

function matchMerchant(order){
  if(!currentMerchant) return false;

  const currentPhone = normalizePhone(currentMerchant.merchantPhone);
  const currentId = String(currentMerchant.merchantId || currentMerchant.id || "").trim();

  const orderMerchantPhone = normalizePhone(order.merchantPhone);
  const orderPickupPhone = normalizePhone(order.pickupPhone);
  const orderMerchantCode = String(order.merchantCode || "").trim();
  const orderMerchantId = String(order.merchantId || "").trim();

  if(currentId && orderMerchantId && orderMerchantId === currentId) return true;
  if(currentId && orderMerchantCode && orderMerchantCode === currentId) return true;
  if(currentPhone && orderMerchantPhone && orderMerchantPhone === currentPhone) return true;
  if(currentPhone && orderPickupPhone && orderPickupPhone === currentPhone) return true;

  return false;
}

function getVisibleOrders(){
  return Object.values(ordersMap)
    .filter(order => {
      if(currentTab === "delivery_progress"){
        return deliveryStatuses.includes(order.status);
      }

      if(currentTab === "merchant_self_delivery"){
        return order.status === "merchant_self_delivery";
      }

      return order.status === currentTab;
    })
    .filter(matchMerchant)
    .sort((a,b) => getOrderTime(b) - getOrderTime(a));
}

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(el => {
    el.classList.remove("active");
  });

  const active = document.querySelector(`[data-tab="${tab}"]`);
  if(active) active.classList.add("active");

  renderOrders();
}

function updateCounts(){
  const all = Object.values(ordersMap).filter(matchMerchant);

  document.getElementById("countPending").textContent =
    all.filter(o => o.status === "merchant_pending").length;

  document.getElementById("countPreparing").textContent =
    all.filter(o => o.status === "merchant_preparing").length;

  document.getElementById("countReady").textContent =
    all.filter(o => o.status === "merchant_ready").length;

  document.getElementById("countSelfDelivery").textContent =
    all.filter(o => o.status === "merchant_self_delivery").length;

  document.getElementById("countDelivery").textContent =
    all.filter(o => deliveryStatuses.includes(o.status)).length;

  document.getElementById("countCompleted").textContent =
    all.filter(o => o.status === "completed").length;
}

function renderOrders(){
  updateCounts();

  const box = document.getElementById("ordersBox");
  const orders = getVisibleOrders();

  if(!orders.length){
    box.innerHTML = `
      <div class="empty">
        目前沒有「${statusTextMap[currentTab] || currentTab}」訂單
      </div>
    `;
    return;
  }

  box.innerHTML = orders.map(order => renderOrderCard(order)).join("");
}

function renderOrderCard(order){
  const orderNo = order.orderNo || order.id || "未命名訂單";
  const customerName = order.customerName || order.receiverName || "未填寫";
  const customerPhone = order.customerPhone || order.dropoffPhone || "";
  const item = order.itemName || order.item || order.serviceType || "未填寫";
  const note = order.note || order.customerNote || "";
  const dropoff = order.dropoffAddress || order.dropoff || "未填寫";
  const advanceAmount = Number(order.advanceAmount || 0);
  const deliveryFee = Number(order.deliveryFee || order.fee || order.riderFee || order.driverFee || 0);
  const total = Number(order.totalFee || order.total || order.merchantFee || order.deliveryFee || order.fee || 0);

  const deliveryTypeLabel =
    order.deliveryTypeLabel ||
    (order.deliveryType === "merchant" ? "店家自送" : "UBee 派騎士");

  const paymentMethodLabel =
    order.paymentMethodLabel ||
    (
      order.paymentMethod === "cash"
        ? "現金付款"
        : order.paymentMethod === "merchant_paid"
          ? "店家已收款"
          : "店家月結 / 週結"
    );

  const progressText = statusTextMap[order.status] || order.status || "狀態更新中";

  let riderText = "";
  if(deliveryStatuses.includes(order.status) || order.status === "completed"){
    riderText = `
      <div class="row"><b>配送進度：</b>${escapeHtml(progressText)}</div>
    `;
  }

  let buttonHtml = "";

  if(order.status === "merchant_pending"){
    buttonHtml = `
      <button type="button" onclick="updateOrderStatus('${escapeHtml(order.id)}','merchant_preparing')">
        接受訂單，開始準備
      </button>
    `;
  }

  if(order.status === "merchant_preparing"){
    buttonHtml = `
      <button class="green" type="button" onclick="updateOrderStatus('${escapeHtml(order.id)}','merchant_ready')">
        準備完成
      </button>
    `;
  }

  if(order.status === "merchant_ready" && order.deliveryType !== "merchant"){
    buttonHtml = `
      <button class="blue" type="button" onclick="updateOrderStatus('${escapeHtml(order.id)}','pending_dispatch')">
        派遣騎士
      </button>
    `;
  }

  return `
    <div class="order">
      <div class="badge">${escapeHtml(statusTextMap[order.status] || order.status)}</div>
      <h3>${escapeHtml(orderNo)}</h3>

      <div class="row"><b>建立時間：</b>${escapeHtml(formatTime(order))}</div>
      <div class="row"><b>客人：</b>${escapeHtml(customerName)}</div>
      <div class="row"><b>電話：</b>${escapeHtml(customerPhone)}</div>
      <div class="row"><b>內容：</b>${escapeHtml(item)}</div>
      <div class="row"><b>送達地址：</b>${escapeHtml(dropoff)}</div>
      <div class="row"><b>配送方式：</b>${escapeHtml(deliveryTypeLabel)}</div>
      <div class="row"><b>付款方式：</b>${escapeHtml(paymentMethodLabel)}</div>
      <div class="row"><b>代墊金額：</b>NT$${escapeHtml(advanceAmount)}</div>
      <div class="row"><b>配送費：</b>NT$${escapeHtml(deliveryFee)}</div>
      <div class="row"><b>總金額：</b>NT$${escapeHtml(total)}</div>
      <div class="row"><b>備註：</b>${escapeHtml(note || "無")}</div>
      ${riderText}

      ${buttonHtml}
    </div>
  `;
}

async function updateOrderStatus(orderId, nextStatus){
  const confirmTextMap = {
    merchant_preparing: "確定接受訂單並開始準備嗎？",
    merchant_ready: "確定商品已準備完成嗎？",
    pending_dispatch: "確定要派遣騎士嗎？派遣後騎士端會收到此任務。"
  };

  if(!confirm(confirmTextMap[nextStatus] || "確定更新狀態嗎？")){
    return;
  }

  const updateData = {
    status: nextStatus,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if(nextStatus === "merchant_preparing"){
    updateData.merchantAcceptedAt = firebase.firestore.FieldValue.serverTimestamp();
  }

  if(nextStatus === "merchant_ready"){
    updateData.merchantReadyAt = firebase.firestore.FieldValue.serverTimestamp();
  }

  if(nextStatus === "pending_dispatch"){
    updateData.dispatchedAt = firebase.firestore.FieldValue.serverTimestamp();
  }

  try{
    await db.collection("orders").doc(orderId).update(updateData);
  }catch(err){
    console.error("更新訂單狀態失敗:", err);
    alert("更新失敗，請稍後再試。");
  }
}

window.addEventListener("load", async () => {
  const loginBtn = document.getElementById("loginBtn");

  if(loginBtn){
    loginBtn.disabled = false;
    loginBtn.removeAttribute("disabled");
    loginBtn.style.pointerEvents = "auto";
    loginBtn.textContent = "登入檢查中...";
  }

  setTimeout(() => forceEnableLoginButton("進入派單中心"), 800);
  setTimeout(() => forceEnableLoginButton("進入派單中心"), 1800);
  setTimeout(() => forceEnableLoginButton("進入派單中心"), 3500);

  try{
    await initMerchantLiff();

    if(merchantLineUserId){
      await loadMerchantProfile();
    }

  }catch(err){
    console.error("店家登入檢查失敗:", err);
    showError("店家登入檢查失敗，請重新開啟店家派單中心。");
  }finally{
    forceEnableLoginButton("進入派單中心");
  }
});
