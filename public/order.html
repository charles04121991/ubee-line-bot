<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UBee｜建立任務</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Arial;background:#f5f5f5;color:#111}
.container{padding:24px 16px 190px}
h1{font-size:26px;margin:24px 0}
.label{font-size:18px;margin:22px 0 10px}
.cards{display:flex;gap:10px}
.card{flex:1;background:white;border-radius:14px;padding:16px 8px;text-align:center;font-size:18px;border:2px solid transparent}
.card.active{border-color:#18c51f}
input,textarea{width:100%;box-sizing:border-box;padding:15px;margin:8px 0;border-radius:12px;border:1px solid #ddd;font-size:17px}
textarea{height:80px;resize:none}
.bottom{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #ddd;padding:14px 18px 22px}
.row{display:flex;justify-content:space-between;font-size:18px;margin:5px 0}
.total{font-weight:800;font-size:22px}
.btn{width:100%;border:0;border-radius:13px;padding:16px;font-size:18px;margin-top:10px}
.quote{background:#111;color:white}
.submit{background:#00c300;color:white}
</style>
</head>

<body>
<div class="container">
  <h1>🚀 建立任務</h1>

  <div class="label">服務類型</div>
  <div class="cards" id="serviceCards">
    <div class="card active" onclick="selectCard('serviceCards', this, '文件急送')">📄 文件</div>
    <div class="card" onclick="selectCard('serviceCards', this, '商務物品')">🏢 商務</div>
    <div class="card" onclick="selectCard('serviceCards', this, '個人物品')">👤 個人</div>
    <div class="card" onclick="selectCard('serviceCards', this, '安全代送')">🔒 安全</div>
  </div>

  <div class="label">路線資訊</div>
  <input id="pickup" placeholder="取件地址">
  <input id="pickupPhone" placeholder="取件電話">
  <input id="dropoff" placeholder="送達地址">
  <input id="dropoffPhone" placeholder="送達電話">

  <div class="label">配送速度</div>
  <div class="cards" id="urgentCards">
    <div class="card active" onclick="setUrgent(this, false)">一般</div>
    <div class="card" onclick="setUrgent(this, true)">急件 +100</div>
  </div>

  <div class="label">任務內容</div>
  <input id="item" placeholder="物品內容">
  <textarea id="note" placeholder="備註"></textarea>
</div>

<div class="bottom">
  <div class="row"><span>距離</span><span id="distanceText">尚未估價</span></div>
  <div class="row"><span>時間</span><span id="durationText">尚未估價</span></div>
  <div class="row"><span>配送費</span><span id="deliveryFee">$99</span></div>
  <div class="row"><span>服務費</span><span>$50</span></div>
  <div class="row"><span>急件費</span><span id="urgentFee">$0</span></div>
  <div class="row total"><span>總計</span><span id="totalFee">$149</span></div>

  <button class="btn quote" onclick="quoteOrder()">立即估價</button>
  <button class="btn submit" onclick="submitOrder()">送出訂單</button>
</div>

<script>
let serviceType = '文件急送';
let urgent = false;

function selectCard(groupId, el, value) {
  serviceType = value;
  document.querySelectorAll('#' + groupId + ' .card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function setUrgent(el, value) {
  urgent = value;
  document.querySelectorAll('#urgentCards .card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  updatePrice();
}

function updatePrice() {
  const baseFee = 99;
  const serviceFee = 50;
  const urgentFee = urgent ? 100 : 0;
  const total = baseFee + serviceFee + urgentFee;

  document.getElementById('deliveryFee').innerText = '$' + baseFee;
  document.getElementById('urgentFee').innerText = '$' + urgentFee;
  document.getElementById('totalFee').innerText = '$' + total;
}

async function quoteOrder() {
  const from = document.getElementById('pickup').value.trim();
  const to = document.getElementById('dropoff').value.trim();

  if (!from || !to) {
    alert('請輸入取件地址與送達地址');
    return;
  }

  document.getElementById('distanceText').innerText = '估價中...';
  document.getElementById('durationText').innerText = '估價中...';

  const res = await fetch(`/api/quote?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
  const data = await res.json();

  if (data.error) {
    alert(data.error);
    document.getElementById('distanceText').innerText = '尚未估價';
    document.getElementById('durationText').innerText = '尚未估價';
    return;
  }

  const serviceFee = 50;
  const urgentFee = urgent ? 100 : 0;
  const total = data.deliveryFee + serviceFee + urgentFee;

  document.getElementById('distanceText').innerText = data.distanceText;
  document.getElementById('durationText').innerText = data.durationText;
  document.getElementById('deliveryFee').innerText = '$' + data.deliveryFee;
  document.getElementById('urgentFee').innerText = '$' + urgentFee;
  document.getElementById('totalFee').innerText = '$' + total;
}

function submitOrder() {
  alert('訂單已送出，系統派單中');
}

updatePrice();
</script>
</body>
</html>
