<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UBee 建立任務</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f6f6f6;
}

/* 上方內容 */
.container{
  padding:24px 16px 130px;
}

/* 區塊 */
.card{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* 輸入框 */
.input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:8px;
  font-size:16px;
}

/* 類型按鈕 */
.type-btn{
  display:inline-block;
  padding:10px 14px;
  border-radius:12px;
  background:#eee;
  margin-right:8px;
  margin-top:8px;
  cursor:pointer;
}
.active{
  border:2px solid #00c300;
  background:white;
}

/* 底部 */
.bottom{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:white;
  border-top:1px solid #ddd;
  padding:8px 16px 14px;
}

/* 行 */
.row{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin:2px 0;
}

/* 總計 */
.total{
  font-weight:800;
  font-size:18px;
  margin-top:4px;
}

/* 按鈕 */
.btn{
  width:100%;
  border:0;
  border-radius:12px;
  padding:11px;
  font-size:16px;
  margin-top:7px;
}

.btn-black{background:black;color:white;}
.btn-green{background:#00c300;color:white;}
</style>
</head>

<body>

<div class="container">

<h2>🚀 建立任務</h2>

<div class="card">
  <div>服務類型</div>
  <div>
    <span class="type-btn active">文件</span>
    <span class="type-btn">商務</span>
    <span class="type-btn">個人</span>
    <span class="type-btn">安全</span>
  </div>
</div>

<div class="card">
  <div>路線資訊</div>
  <input id="pickup" class="input" placeholder="取件地址">
  <input id="pickupPhone" class="input" placeholder="取件電話">
  <input id="dropoff" class="input" placeholder="送達地址">
  <input id="dropoffPhone" class="input" placeholder="送達電話">
</div>

</div>

<!-- 底部 -->
<div class="bottom">

<div class="row">
  <div>距離</div>
  <div id="distanceText">尚未估價</div>
</div>

<div class="row">
  <div>時間</div>
  <div id="durationText">尚未估價</div>
</div>

<div class="row">
  <div>配送費</div>
  <div id="deliveryFee">$99</div>
</div>

<div class="row">
  <div>服務費</div>
  <div>$50</div>
</div>

<div class="row">
  <div>急件費</div>
  <div id="urgentFee">$0</div>
</div>

<div class="row total">
  <div>總計</div>
  <div id="totalFee">$149</div>
</div>

<button class="btn btn-black" onclick="quoteOrder()">立即估價</button>
<button class="btn btn-green">送出訂單</button>

</div>

<script>

let urgent = false;

async function quoteOrder(){
  const from = document.getElementById('pickup').value.trim();
  const to = document.getElementById('dropoff').value.trim();

  if(!from || !to){
    alert('請輸入地址');
    return;
  }

  document.getElementById('distanceText').innerText = '估價中...';
  document.getElementById('durationText').innerText = '估價中...';

  const res = await fetch(`/api/quote?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  const serviceFee = 50;
  const urgentFee = urgent ? 100 : 0;
  const total = data.deliveryFee + serviceFee + urgentFee;

  document.getElementById('distanceText').innerText = data.distanceText;
  document.getElementById('durationText').innerText = data.durationText;
  document.getElementById('deliveryFee').innerText = '$' + data.deliveryFee;
  document.getElementById('urgentFee').innerText = '$' + urgentFee;
  document.getElementById('totalFee').innerText = '$' + total;
}

</script>

</body>
</html>
