<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBee 下單</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f5;
}

.container {
  padding: 16px;
  padding-bottom: 120px;
}

h2 {
  margin-bottom: 10px;
}

.card-group {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.card {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  background: white;
  border-radius: 12px;
  text-align: center;
  border: 2px solid transparent;
}

.card.active {
  border-color: #00c300;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 1px solid #ddd;
  padding: 10px;
}

.price {
  font-size: 14px;
  margin-bottom: 5px;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #00c300;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 建立任務</h2>

<!-- 服務類型 -->
<div>
<p>服務類型</p>
<div class="card-group">
  <div class="card active" onclick="selectType(this,'文件')">📄 文件</div>
  <div class="card" onclick="selectType(this,'商務')">🏢 商務</div>
  <div class="card" onclick="selectType(this,'個人')">👤 個人</div>
  <div class="card" onclick="selectType(this,'安全')">🔒 安全</div>
</div>
</div>

<input id="pickup" placeholder="取件地址">
<input id="dropoff" placeholder="送達地址">
<input id="phone" placeholder="聯絡電話">

<!-- 急件 -->
<div style="margin-top:15px;">
<p>配送速度</p>
<div class="card-group">
  <div class="card active" onclick="setUrgent(false)">一般</div>
  <div class="card" onclick="setUrgent(true)">急件 +100</div>
</div>
</div>

<textarea id="note" placeholder="備註"></textarea>

</div>

<!-- 底部 -->
<div class="bottom-bar">
  <div class="price">預估費用：<span id="price">99</span> 元</div>
  <button class="btn" onclick="submitOrder()">送出訂單</button>
</div>

<script>

let type = '文件';
let urgent = false;

function selectType(el, t) {
  type = t;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function setUrgent(val) {
  urgent = val;
  updatePrice();

  document.querySelectorAll('.card-group')[1].querySelectorAll('.card')
    .forEach(c => c.classList.remove('active'));

  event.target.classList.add('active');
}

function updatePrice() {
  let price = 99;
  if (urgent) price += 100;
  document.getElementById('price').innerText = price;
}

function submitOrder() {
  alert("🚀 訂單已送出，系統派單中");
}

</script>

</body>
</html>
