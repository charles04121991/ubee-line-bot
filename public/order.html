<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UBee 建立任務</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body { font-family: Arial; padding:20px; }
    input, textarea {
      width:100%;
      margin-bottom:10px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button {
      width:100%;
      padding:15px;
      background:#00c300;
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:18px;
    }
  </style>
</head>

<body>

<h2>🚀 UBee 建立任務</h2>

<input id="pickup" placeholder="取件地址">
<input id="pickupPhone" placeholder="取件電話">
<input id="dropoff" placeholder="送達地址">
<input id="dropoffPhone" placeholder="送達電話">
<input id="item" placeholder="物品內容">
<textarea id="note" placeholder="備註"></textarea>

<button onclick="submitOrder()">送出訂單</button>

<script>
let userId = 'web-order';
let liffId = '';

async function initPage(){
  try{
    const res = await fetch('/api/config');
    const cfg = await res.json();
    liffId = cfg.liffId;

    if (window.liff && liffId){
      await liff.init({ liffId });

      if (liff.isLoggedIn()){
        const profile = await liff.getProfile();
        userId = profile.userId;

        console.log('✅ userId:', userId);
        alert('userId: ' + userId);
      } else {
        liff.login();
      }
    } else {
      alert('❌ LIFF 沒載入或沒設定');
    }

  }catch(err){
    console.log(err);
    alert('❌ init錯誤');
  }
}

function getData(){
  return {
    pickup: document.getElementById('pickup').value,
    pickupPhone: document.getElementById('pickupPhone').value,
    dropoff: document.getElementById('dropoff').value,
    dropoffPhone: document.getElementById('dropoffPhone').value,
    item: document.getElementById('item').value,
    note: document.getElementById('note').value,
    userId
  };
}

async function submitOrder(){

  if(userId === 'web-order'){
    alert('⚠️ 請從 LINE 裡開啟');
    return;
  }

  const data = getData();

  const res = await fetch('/api/orders',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });

  const result = await res.json();

  if(result.success){
    alert('✅ 訂單成功: ' + result.orderId);
  }else{
    alert('❌ 失敗: ' + result.error);
  }
}

initPage();
</script>

</body>
</html>
