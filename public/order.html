<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:16px; padding-bottom:140px; }
input, textarea {
  width:100%; padding:12px; margin-top:10px;
  border-radius:10px; border:1px solid #ddd;
}
.card-group { display:flex; gap:10px; }
.card {
  flex:1; padding:10px; background:white;
  border-radius:10px; text-align:center;
  border:2px solid transparent;
}
.card.active { border-color:#00c300; }

.bottom {
  position:fixed; bottom:0; left:0; right:0;
  background:white; padding:10px; border-top:1px solid #ddd;
}
.btn {
  width:100%; padding:14px;
  background:#00c300; color:white;
  border:none; border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h3>🚀 建立任務</h3>

<!-- 服務類型 -->
<p>服務類型</p>
<div class="card-group">
  <div class="card active" onclick="setType(this,'文件')">📄 文件</div>
  <div class="card" onclick="setType(this,'商務')">🏢 商務</div>
  <div class="card" onclick="setType(this,'個人')">👤 個人</div>
  <div class="card" onclick="setType(this,'安全')">🔒 安全</div>
</div>

<input id="pickup" placeholder="取件地址">
<input id="pickupPhone" placeholder="取件電話">

<input id="dropoff" placeholder="送達地址">
<input id="dropoffPhone" placeholder="送達電話">

<!-- 急件 -->
<p style="margin-top:10px;">配送速度</p>
<div class="card-group">
  <div class="card active" onclick="setUrgent(false)">一般</div>
  <div class="card" onclick="setUrgent(true)">急件 +100</div>
</div>

<textarea id="note" placeholder="備註"></textarea>

</div>

<div class="bottom">
  <div>配送費：99</div>
  <div>服務費：50</div>
  <div>急件費：<span id="urgentFee">0</span></div>
  <div><b>總計：<span id="total">149</span></b></div>
  <button class="btn" onclick="submit()">送出訂單</button>
</div>

<script>
let urgent = false;

function setType(el){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function setUrgent(val){
  urgent = val;

  document.querySelectorAll('.card-group')[1].querySelectorAll('.card')
    .forEach(c=>c.classList.remove('active'));

  event.target.classList.add('active');

  document.getElementById('urgentFee').innerText = val ? 100 : 0;
  document.getElementById('total').innerText = val ? 249 : 149;
}

function submit(){
  alert("🚀 訂單已送出，系統派單中");
}
</script>

</body>
</html>
