<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f6f6f6">
  <title>UBee｜我的訂單</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#ffffff;
      --card2:#f3f3f3;
      --text:#111111;
      --muted:#666666;
      --line:#dddddd;
      --accent:#facc15;
      --accent2:#fbbf24;
      --green:#22c55e;
      --blue:#38bdf8;
      --red:#ef4444;
      --shadow:0 14px 36px rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    button{
      font-family:inherit;
      cursor:pointer;
      border:none;
    }

    .app{
      width:100%;
      max-width:520px;
      min-height:100vh;
      margin:0 auto;
      padding:calc(18px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 92% 0%, rgba(250,204,21,.25), transparent 30%),
        linear-gradient(180deg,#ffffff 0%,#f6f6f6 48%,#f2f2f2 100%);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brand{
      font-size:28px;
      font-weight:1000;
      letter-spacing:-.5px;
      line-height:1.1;
    }

    .brand span{
      color:var(--accent2);
    }

    .brand-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      letter-spacing:1.4px;
      text-transform:uppercase;
    }

    .refresh-btn{
      height:42px;
      padding:0 14px;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-size:14px;
      font-weight:1000;
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      padding:22px 20px;
      margin-bottom:16px;
      background:
        radial-gradient(circle at 88% 18%, rgba(250,204,21,.35), transparent 32%),
        linear-gradient(135deg,#111 0%,#1c1c1c 58%,#0c0c0c 100%);
      color:#fff;
      box-shadow:0 22px 50px rgba(0,0,0,.18);
    }

    .hero-kicker{
      color:var(--accent);
      font-size:13px;
      font-weight:1000;
      margin-bottom:8px;
      letter-spacing:1px;
    }

    .hero-title{
      font-size:30px;
      line-height:1.25;
      font-weight:1000;
      letter-spacing:-.5px;
      margin:0;
      position:relative;
      z-index:2;
    }

    .hero-sub{
      margin-top:10px;
      max-width:310px;
      color:#d6d6d6;
      font-size:14px;
      font-weight:800;
      line-height:1.7;
      position:relative;
      z-index:2;
    }

    .hero-mark{
      position:absolute;
      right:16px;
      bottom:12px;
      width:92px;
      height:92px;
      border-radius:26px;
      background:rgba(250,204,21,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:50px;
      transform:rotate(-7deg);
      z-index:1;
    }

    .notice{
      border:1px solid rgba(239,68,68,.28);
      background:rgba(239,68,68,.08);
      color:#7f1d1d;
      border-radius:20px;
      padding:14px;
      font-size:14px;
      font-weight:900;
      line-height:1.7;
      margin-bottom:14px;
    }

    .profile-card{
      display:flex;
      align-items:center;
      gap:12px;
      border:1px solid rgba(250,204,21,.42);
      background:rgba(250,204,21,.12);
      border-radius:22px;
      padding:14px;
      margin-bottom:14px;
    }

    .avatar{
      width:48px;
      height:48px;
      border-radius:18px;
      background:#111;
      color:var(--accent);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:1000;
      overflow:hidden;
      flex:0 0 auto;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .profile-name{
      font-size:17px;
      font-weight:1000;
      color:var(--text);
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .profile-desc{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      line-height:1.45;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(0,0,0,.06);
      border-radius:24px;
      padding:17px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .kicker{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      margin-bottom:4px;
    }

    .title{
      color:var(--text);
      font-size:22px;
      font-weight:1000;
      line-height:1.35;
    }

    .badge{
      flex:0 0 auto;
      border-radius:999px;
      padding:8px 11px;
      font-size:12px;
      font-weight:1000;
      color:#111;
      background:var(--accent);
      white-space:nowrap;
    }

    .badge.success{
      background:rgba(34,197,94,.14);
      color:#15803d;
    }

    .badge.danger{
      background:rgba(239,68,68,.12);
      color:#dc2626;
    }

    .badge.info{
      background:rgba(56,189,248,.12);
      color:#0284c7;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:14px 0;
    }

    .meta{
      border:1px solid var(--line);
      background:var(--card2);
      border-radius:17px;
      padding:12px;
      min-width:0;
    }

    .meta-label{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      margin-bottom:5px;
    }

    .meta-value{
      color:var(--text);
      font-size:15px;
      font-weight:1000;
      line-height:1.45;
      word-break:break-word;
    }

    .timeline{
      position:relative;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:0;
      margin:18px 0 14px;
      padding:8px 0 4px;
    }

    .timeline-line{
      position:absolute;
      left:7.14%;
      right:7.14%;
      top:21px;
      height:4px;
      border-radius:999px;
      background:#d8d8d8;
      overflow:hidden;
      z-index:0;
    }

    .timeline-fill{
      height:100%;
      width:var(--progress,0%);
      border-radius:999px;
      background:linear-gradient(90deg,var(--accent),var(--green));
      transition:width .25s ease;
    }

    .step{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      min-width:0;
      padding:0 2px;
    }

    .dot{
      width:30px;
      height:30px;
      border-radius:999px;
      border:2px solid #d0d0d0;
      background:#fff;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:1000;
      margin-bottom:7px;
      box-shadow:0 0 0 4px #fff;
    }

    .step.done .dot{
      background:var(--accent);
      border-color:var(--accent);
      color:#111;
    }

    .step.current .dot{
      background:var(--green);
      border-color:var(--green);
      color:#fff;
      box-shadow:0 0 0 5px rgba(34,197,94,.16);
    }

    .step-title{
      color:var(--text);
      font-size:11px;
      font-weight:1000;
      line-height:1.25;
      min-height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      word-break:keep-all;
    }

    .step-desc{
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      line-height:1.25;
      margin-top:2px;
      word-break:keep-all;
    }

    .status-box{
      border:1px solid rgba(250,204,21,.38);
      background:rgba(250,204,21,.10);
      border-radius:18px;
      padding:13px;
      margin:12px 0 0;
    }

    .status-kicker{
      color:#b45309;
      font-size:12px;
      font-weight:1000;
      margin-bottom:5px;
    }

    .status-text{
      color:var(--text);
      font-size:14px;
      font-weight:900;
      line-height:1.65;
    }

    .route{
      border:1px solid var(--line);
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      margin:14px 0;
    }

    .route-row{
      display:flex;
      gap:11px;
      padding:13px 14px;
      border-bottom:1px solid var(--line);
    }

    .route-row:last-child{
      border-bottom:none;
    }

    .route-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      margin-top:6px;
      flex:0 0 auto;
    }

    .pickup-dot{
      background:var(--green);
    }

    .dropoff-dot{
      background:var(--blue);
    }

    .route-label{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      margin-bottom:4px;
    }

    .route-value{
      color:var(--text);
      font-size:14px;
      font-weight:900;
      line-height:1.55;
      word-break:break-word;
    }

    .order-list{
      display:grid;
      gap:10px;
    }

    .order-item{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:20px;
      padding:14px;
    }

    .order-item.active{
      border-color:rgba(250,204,21,.9);
      box-shadow:0 0 0 2px rgba(250,204,21,.2);
      background:rgba(250,204,21,.07);
    }

    .order-item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }

    .order-item-title{
      font-size:16px;
      color:var(--text);
      font-weight:1000;
      line-height:1.4;
    }

    .order-item-id{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      word-break:break-all;
    }

    .order-item-status{
      flex:0 0 auto;
      font-size:12px;
      font-weight:1000;
      color:#111;
      background:var(--accent);
      border-radius:999px;
      padding:6px 9px;
      white-space:nowrap;
    }

    .order-item-desc{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      line-height:1.7;
      word-break:break-word;
    }

    .empty{
      text-align:center;
      padding:28px 14px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      line-height:1.8;
    }

    .empty-icon{
      width:72px;
      height:72px;
      border-radius:24px;
      background:rgba(250,204,21,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 14px;
      font-size:36px;
    }

    .empty-title{
      color:var(--text);
      font-size:20px;
      font-weight:1000;
      margin-bottom:8px;
    }

    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      width:100%;
      min-height:52px;
      border-radius:17px;
      padding:13px 12px;
      font-size:15px;
      font-weight:1000;
    }

    .btn-yellow{
      background:var(--accent);
      color:#111;
    }

    .btn-light{
      background:#fff;
      color:#111;
      border:1px solid var(--line);
    }

    .loading-line{
      height:12px;
      border-radius:999px;
      background:linear-gradient(90deg,#eee,#f7f7f7,#eee);
      margin:8px 0;
      animation:pulse 1.1s infinite ease-in-out;
    }

    @keyframes pulse{
      0%{opacity:.55}
      50%{opacity:1}
      100%{opacity:.55}
    }

    .hidden{
      display:none !important;
    }

    @media(max-width:380px){
      .app{
        padding-left:12px;
        padding-right:12px;
      }

      .hero-title{
        font-size:27px;
      }

      .meta-grid{
        grid-template-columns:1fr;
      }

      .dot{
        width:27px;
        height:27px;
        font-size:12px;
      }

      .timeline-line{
        top:19px;
      }

      .step-title{
        font-size:10px;
        min-height:27px;
      }

      .step-desc{
        font-size:9px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand"><span>U</span>Bee</div>
        <div class="brand-sub">Order Progress</div>
      </div>
      <button class="refresh-btn" type="button" onclick="reloadPage()">重新整理</button>
    </div>

    <section class="hero">
      <div class="hero-kicker">UBee 我的訂單</div>
      <h1 class="hero-title">任務進度<br>即時掌握</h1>
      <div class="hero-sub">查看目前訂單狀態、配送流程、取件與送達資訊。</div>
      <div class="hero-mark">📦</div>
    </section>

    <section id="setupBox" class="notice hidden"></section>

    <section id="profileCard" class="profile-card hidden">
      <div class="avatar" id="profileAvatar">🐝</div>
      <div>
        <div class="profile-name" id="profileName">LINE 身分確認中</div>
        <div class="profile-desc" id="profileDesc">請稍候，系統正在確認你的 UBee 訂單資料。</div>
      </div>
    </section>

    <section id="mainCard" class="card">
      <div class="empty">
        <div class="empty-icon">🐝</div>
        <div class="empty-title">正在啟動 UBee 訂單查詢</div>
        <div>請稍候，系統正在確認 LINE 身分與訂單資料。</div>
      </div>
    </section>

    <section id="detailCard" class="card hidden"></section>

    <section id="listCard" class="card hidden">
      <div class="card-head">
        <div>
          <div class="kicker">ORDER LIST</div>
          <div class="title">最近訂單</div>
        </div>
      </div>
      <div id="orderList" class="order-list"></div>
    </section>

    <div class="btn-row">
      <button class="btn btn-yellow" type="button" onclick="openOrderPage()">立即下單</button>
      <button class="btn btn-light" type="button" onclick="openLineOfficialAccount()">線上客服</button>
    </div>
  </div>

<script>
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
document.addEventListener('gestureend', function(e){ e.preventDefault(); });

let lastTouchEnd = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now - lastTouchEnd <= 300){
    e.preventDefault();
  }
  lastTouchEnd = now;
}, { passive:false });

document.addEventListener('dblclick', function(e){
  e.preventDefault();
}, { passive:false });

const PROGRESS_LIFF_ID = '';

const ORDER_LIFF_URL = 'https://liff.line.me/2009895876-eDSfemYo';
const LINE_OFFICIAL_URL = 'https://line.me/R/ti/p/@686rwnvn';

const firebaseConfig = {
  apiKey: "AIzaSyCNuP9x_GWDjmJx0-xyO316fa6jiFSfa-s",
  authDomain: "ubee-oms.firebaseapp.com",
  projectId: "ubee-oms"
};

if(window.firebase && !firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db = window.firebase ? firebase.firestore() : null;

let userId = '';
let profile = null;
let selectedOrderId = '';
let selectedOrderUnsubscribe = null;
let allOrdersCache = [];

const ACTIVE_STATUSES = [
  'pending_payment',
  'pending_dispatch',
  'merchant_pending',
  'accepted',
  'arrived_pickup',
  'picked_up',
  'arrived_dropoff'
];

const STEPS = [
  { key:'pending_payment', rank:0, icon:'1', title:'待付款', desc:'確認付款' },
  { key:'pending_dispatch', rank:1, icon:'2', title:'待派單', desc:'媒合騎士' },
  { key:'accepted', rank:2, icon:'3', title:'已接單', desc:'騎士出發' },
  { key:'arrived_pickup', rank:3, icon:'4', title:'到取件', desc:'抵達取件' },
  { key:'picked_up', rank:4, icon:'5', title:'已取件', desc:'任務處理' },
  { key:'arrived_dropoff', rank:5, icon:'6', title:'到送達', desc:'抵達送達' },
  { key:'completed', rank:6, icon:'7', title:'已完成', desc:'任務完成' }
];

function qs(id){
  return document.getElementById(id);
}

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function reloadPage(){
  window.location.reload();
}

function openOrderPage(){
  window.location.href = ORDER_LIFF_URL;
}

function openLineOfficialAccount(){
  window.location.href = LINE_OFFICIAL_URL;
}

function showNotice(html){
  qs('setupBox').classList.remove('hidden');
  qs('setupBox').innerHTML = html;
}

function setLoading(title, text){
  qs('mainCard').classList.remove('hidden');
  qs('mainCard').innerHTML = `
    <div class="empty">
      <div class="empty-icon">🐝</div>
      <div class="empty-title">${escapeHtml(title)}</div>
      <div>${escapeHtml(text)}</div>
      <div style="margin-top:18px;">
        <div class="loading-line"></div>
        <div class="loading-line" style="width:86%;"></div>
        <div class="loading-line" style="width:72%;"></div>
      </div>
    </div>
  `;
}

function setMessage(icon, title, text, buttonHtml = ''){
  qs('mainCard').classList.remove('hidden');
  qs('mainCard').innerHTML = `
    <div class="empty">
      <div class="empty-icon">${escapeHtml(icon)}</div>
      <div class="empty-title">${escapeHtml(title)}</div>
      <div>${escapeHtml(text)}</div>
      ${buttonHtml}
    </div>
  `;
}

function showProfileCard(){
  const card = qs('profileCard');
  const avatar = qs('profileAvatar');

  card.classList.remove('hidden');

  const name = profile?.displayName || 'UBee 會員';
  const pictureUrl = profile?.pictureUrl || '';

  qs('profileName').innerText = name;
  qs('profileDesc').innerText = 'LINE 身分已確認｜正在同步你的 UBee 訂單';

  if(pictureUrl){
    avatar.innerHTML = `<img src="${escapeHtml(pictureUrl)}" alt="profile">`;
  }else{
    avatar.innerText = '🐝';
  }
}

function getStatusLabel(status){
  const map = {
    draft_confirm:'待確認',
    pending_payment:'待付款',
    merchant_pending:'店家確認中',
    pending_dispatch:'等待派單',
    accepted:'騎士已接單',
    arrived_pickup:'騎士已抵達取件地點',
    picked_up:'騎士已取件',
    arrived_dropoff:'騎士已抵達送達地點',
    completed:'已完成',
    done:'已完成',
    cancelled:'已取消',
    quote_only:'估價完成'
  };

  return map[status] || status || '處理中';
}

function getStatusRank(status){
  const map = {
    draft_confirm:0,
    pending_payment:0,
    merchant_pending:1,
    pending_dispatch:1,
    accepted:2,
    arrived_pickup:3,
    picked_up:4,
    arrived_dropoff:5,
    completed:6,
    done:6
  };

  if(status === 'cancelled') return 0;
  return Number.isFinite(map[status]) ? map[status] : 0;
}

function getProgress(status){
  if(status === 'cancelled') return 0;
  const rank = getStatusRank(status);
  return Math.max(0, Math.min(100, Math.round((rank / 6) * 100)));
}

function getBadgeClass(status){
  if(status === 'cancelled') return 'danger';
  if(status === 'completed' || status === 'done') return 'success';
  if(status === 'accepted' || status === 'arrived_pickup' || status === 'picked_up' || status === 'arrived_dropoff') return 'info';
  return '';
}

function getStatusMessage(status){
  const map = {
    draft_confirm:'訂單正在等待確認，請留意 UBee 後續通知。',
    pending_payment:'訂單已建立，請完成付款或確認現金付款，系統才會開始派單。',
    merchant_pending:'店家訂單正在確認中，確認後會進入派單流程。',
    pending_dispatch:'系統正在媒合附近可服務的 UBee 騎士，請稍候。',
    accepted:'騎士已接單，正在前往取件地點。',
    arrived_pickup:'騎士已抵達取件地點，正在確認任務內容。',
    picked_up:'騎士已完成取件，正在前往送達地點。',
    arrived_dropoff:'騎士已抵達送達地點，正在完成交付。',
    completed:'任務已完成，感謝你使用 UBee 跑腿。',
    done:'任務已完成，感謝你使用 UBee 跑腿。',
    cancelled:'此訂單已取消，如有付款或退款問題，請聯繫 UBee 客服。',
    quote_only:'系統已完成估價，尚未正式建立派單任務。'
  };

  return map[status] || '訂單處理中，請留意任務狀態更新。';
}

function getPaymentText(order){
  const method = String(order?.paymentMethod || '').toLowerCase();

  if(method === 'cash' || method.includes('現金')) return '現金';
  if(method === 'jko' || method.includes('街口')) return '街口支付';

  return order?.paymentMethod || '尚未選擇';
}

function money(value){
  const num = Number(value || 0);
  if(!Number.isFinite(num) || num <= 0) return '-';
  return `NT$${Math.round(num)}`;
}

function formatTime(value){
  if(!value) return '-';

  try{
    const date = value.toDate ? value.toDate() : new Date(value);
    return date.toLocaleString('zh-TW', {
      month:'2-digit',
      day:'2-digit',
      hour:'2-digit',
      minute:'2-digit'
    });
  }catch(e){
    return '-';
  }
}

function getTimeMs(order){
  const value = order?.createdAt || order?.updatedAt || 0;

  if(value && typeof value.toDate === 'function'){
    return value.toDate().getTime();
  }

  if(typeof value === 'number'){
    return value;
  }

  const parsed = Date.parse(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function getPickup(order){
  return order?.pickupAddress || order?.pickup || order?.fromAddress || '尚未提供取件地點';
}

function getDropoff(order){
  return order?.dropoffAddress || order?.dropoff || order?.toAddress || '尚未提供送達地點';
}

function getService(order){
  return order?.serviceType || order?.serviceName || 'UBee 跑腿任務';
}

function getTotal(order){
  return order?.total || order?.totalFee || order?.price || 0;
}

function getRider(order){
  return order?.riderName || order?.riderDisplayName || order?.riderPhone || order?.riderId || '尚未媒合';
}

function renderTimeline(status){
  const rank = getStatusRank(status);
  const progress = getProgress(status);

  const html = STEPS.map(step => {
    let cls = '';

    if(status === 'cancelled'){
      cls = step.rank === 0 ? 'done' : '';
    }else if(step.rank < rank){
      cls = 'done';
    }else if(step.rank === rank){
      cls = 'current';
    }

    return `
      <div class="step ${cls}">
        <div class="dot">${escapeHtml(step.icon)}</div>
        <div class="step-title">${escapeHtml(step.title)}</div>
        <div class="step-desc">${escapeHtml(step.desc)}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="timeline" style="--progress:${progress}%;">
      <div class="timeline-line">
        <div class="timeline-fill"></div>
      </div>
      ${html}
    </div>
  `;
}

function renderDetail(order){
  if(!order){
    qs('detailCard').classList.add('hidden');
    return;
  }

  const status = order.status || 'pending_payment';
  const badgeClass = getBadgeClass(status);

  qs('detailCard').classList.remove('hidden');

  qs('detailCard').innerHTML = `
    <div class="card-head">
      <div>
        <div class="kicker">目前查看訂單</div>
        <div class="title">${escapeHtml(getService(order))}</div>
      </div>
      <div class="badge ${badgeClass}">${escapeHtml(getStatusLabel(status))}</div>
    </div>

    <div class="meta-grid">
      <div class="meta">
        <div class="meta-label">訂單編號</div>
        <div class="meta-value">${escapeHtml(order.id || '-')}</div>
      </div>
      <div class="meta">
        <div class="meta-label">建立時間</div>
        <div class="meta-value">${escapeHtml(formatTime(order.createdAt || order.updatedAt))}</div>
      </div>
      <div class="meta">
        <div class="meta-label">付款方式</div>
        <div class="meta-value">${escapeHtml(getPaymentText(order))}</div>
      </div>
      <div class="meta">
        <div class="meta-label">預估費用</div>
        <div class="meta-value">${escapeHtml(money(getTotal(order)))}</div>
      </div>
    </div>

    ${renderTimeline(status)}

    <div class="status-box">
      <div class="status-kicker">目前進度</div>
      <div class="status-text">${escapeHtml(getStatusMessage(status))}</div>
    </div>

    <div class="route">
      <div class="route-row">
        <div class="route-dot pickup-dot"></div>
        <div>
          <div class="route-label">取件地點</div>
          <div class="route-value">${escapeHtml(getPickup(order))}</div>
        </div>
      </div>
      <div class="route-row">
        <div class="route-dot dropoff-dot"></div>
        <div>
          <div class="route-label">送達地點</div>
          <div class="route-value">${escapeHtml(getDropoff(order))}</div>
        </div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta">
        <div class="meta-label">騎士</div>
        <div class="meta-value">${escapeHtml(getRider(order))}</div>
      </div>
      <div class="meta">
        <div class="meta-label">距離 / 時間</div>
        <div class="meta-value">${escapeHtml(order.distanceText || '-')}｜${escapeHtml(order.durationText || '-')}</div>
      </div>
    </div>
  `;
}

function renderOrderList(orders){
  const listCard = qs('listCard');
  const list = qs('orderList');

  if(!orders.length){
    listCard.classList.add('hidden');
    return;
  }

  listCard.classList.remove('hidden');

  list.innerHTML = orders.map(order => {
    const isActive = order.id === selectedOrderId;
    const status = order.status || 'pending_payment';

    return `
      <button class="order-item ${isActive ? 'active' : ''}" type="button" onclick="selectOrder('${escapeHtml(order.id)}')">
        <div class="order-item-top">
          <div>
            <div class="order-item-title">${escapeHtml(getService(order))}</div>
            <div class="order-item-id">${escapeHtml(order.id || '-')}</div>
          </div>
          <div class="order-item-status">${escapeHtml(getStatusLabel(status))}</div>
        </div>

        <div class="order-item-desc">
          建立時間：${escapeHtml(formatTime(order.createdAt || order.updatedAt))}<br>
          取件：${escapeHtml(getPickup(order))}<br>
          送達：${escapeHtml(getDropoff(order))}<br>
          金額：${escapeHtml(money(getTotal(order)))}
        </div>
      </button>
    `;
  }).join('');
}

async function queryOrdersByField(fieldName){
  const snap = await db.collection('orders')
    .where(fieldName, '==', userId)
    .limit(30)
    .get();

  const result = [];

  snap.forEach(doc => {
    result.push({
      id:doc.id,
      ...doc.data()
    });
  });

  return result;
}

async function loadOrders(){
  if(!db){
    setMessage('⚠️','系統尚未連線','Firebase 尚未載入，請稍後再試。');
    return;
  }

  setLoading('正在讀取你的訂單','正在同步進行中任務與最近訂單。');

  try{
    const byUserId = await queryOrdersByField('userId');
    const byCustomerId = await queryOrdersByField('customerId');

    const map = new Map();

    [...byUserId, ...byCustomerId].forEach(order => {
      if(order.userId === userId || order.customerId === userId){
        map.set(order.id, order);
      }
    });

    const orders = Array.from(map.values()).sort((a,b) => getTimeMs(b) - getTimeMs(a));
    allOrdersCache = orders;

    if(!orders.length){
      qs('detailCard').classList.add('hidden');
      qs('listCard').classList.add('hidden');

      setMessage(
        '📦',
        '目前沒有訂單',
        '這個 LINE 帳號目前沒有 UBee 訂單紀錄。你可以先建立一筆任務。',
        `<div style="margin-top:16px;"><button class="btn btn-yellow" type="button" onclick="openOrderPage()">立即下單</button></div>`
      );

      return;
    }

    const activeOrder = orders.find(order => ACTIVE_STATUSES.includes(order.status));
    const firstOrder = activeOrder || orders[0];

    selectedOrderId = firstOrder.id;
    renderOrderList(orders);
    selectOrder(firstOrder.id);

  }catch(err){
    console.error('讀取訂單失敗:', err);
    setMessage('⚠️','訂單讀取失敗','目前無法讀取你的訂單資料，請稍後重新整理。');
  }
}

function stopSelectedListener(){
  if(selectedOrderUnsubscribe){
    try{
      selectedOrderUnsubscribe();
    }catch(e){}
    selectedOrderUnsubscribe = null;
  }
}

function selectOrder(orderId){
  if(!orderId || !db) return;

  selectedOrderId = orderId;
  stopSelectedListener();

  const cached = allOrdersCache.find(order => order.id === orderId);
  if(cached){
    renderDetail(cached);
    renderOrderList(allOrdersCache);
    qs('mainCard').classList.add('hidden');
  }

  selectedOrderUnsubscribe = db.collection('orders').doc(orderId).onSnapshot(doc => {
    if(!doc.exists){
      setMessage('⚠️','找不到訂單','這筆訂單不存在或已被移除。');
      renderDetail(null);
      return;
    }

    const order = {
      id:doc.id,
      ...doc.data()
    };

    if(order.userId !== userId && order.customerId !== userId){
      setMessage('🔒','無法查看此訂單','這筆訂單不是你的 LINE 帳號建立的訂單。');
      renderDetail(null);
      return;
    }

    const index = allOrdersCache.findIndex(item => item.id === order.id);

    if(index >= 0){
      allOrdersCache[index] = order;
    }else{
      allOrdersCache.unshift(order);
    }

    allOrdersCache.sort((a,b) => getTimeMs(b) - getTimeMs(a));

    qs('mainCard').classList.add('hidden');
    renderDetail(order);
    renderOrderList(allOrdersCache);

  }, err => {
    console.error('訂單即時監聽失敗:', err);
    setMessage('⚠️','訂單讀取失敗','目前無法即時讀取訂單狀態，請稍後再試。');
  });
}

async function initLiff(){
  if(!PROGRESS_LIFF_ID){
    showNotice(
      '目前 <strong>PROGRESS_LIFF_ID</strong> 尚未填入。<br>' +
      '這是第一階段正常狀態：請先部署這個頁面，新增 LINE LIFF App 後，把新的 LIFF ID 貼回這個檔案。'
    );

    setMessage(
      '🛠️',
      'LIFF 尚未完成設定',
      '請先完成 LINE Developers 的「UBee 我的訂單」LIFF App 建立。'
    );

    return false;
  }

  if(typeof liff === 'undefined'){
    setMessage('⚠️','LINE SDK 載入失敗','請確認網路正常，或從 LINE 官方帳號重新開啟。');
    return false;
  }

  try{
    await liff.init({ liffId:PROGRESS_LIFF_ID });

    const cleanUrl = window.location.origin + window.location.pathname;

    if(!liff.isLoggedIn()){
      liff.login({ redirectUri:cleanUrl });
      return false;
    }

    profile = await liff.getProfile();
    userId = profile?.userId || '';

    if(!userId || !userId.startsWith('U')){
      throw new Error('無法取得 LINE userId');
    }

    localStorage.setItem('ubee_customer_line_user_id', userId);

    showProfileCard();

    return true;

  }catch(err){
    console.error('LIFF 初始化失敗:', err);

    setMessage(
      '⚠️',
      'LINE 身分驗證失敗',
      '請關閉此頁面後，重新從 UBee LINE 官方帳號開啟我的訂單。'
    );

    return false;
  }
}

async function bootstrap(){
  setLoading('正在啟動我的訂單','正在準備 LINE 身分驗證與訂單資料。');

  const ok = await initLiff();

  if(!ok) return;

  await loadOrders();
}

window.addEventListener('beforeunload', () => {
  stopSelectedListener();
});

bootstrap();
</script>
